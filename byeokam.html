<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>벽암산업 입실기록</title>
<style>
  /* 짐체크 앱(luggage.html)과 레이아웃은 비슷하지만, 헷갈리지 않도록 색상 테마를 완전히 다르게(호박색 계열) 씀 */
  :root{
    --gray-bg:#ffffff; --gray-border:#e2d4bc; --gray-text:#78716c;
    --amber-bg:#fef3c7; --amber-border:#d97706; --amber-text:#92400e;
    --accent:#d97706; --accent-dark:#92400e;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  body{
    margin:0; font-family:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background:#fffbeb; color:#292524; user-select:none;
  }
  #app{ max-width:480px; margin:0 auto; min-height:100vh; min-height:100dvh; background:#fffdf7; display:flex; flex-direction:column; }

  header{
    position:sticky; top:0; z-index:10; background:#78350f; color:#fff;
    padding:14px 16px;
  }
  header .top-row{ display:flex; justify-content:space-between; align-items:center; }
  header .title{ font-size:17px; font-weight:800; }
  header .sub{ font-size:12px; color:#fde68a; font-weight:600; margin-top:2px; }
  header .back{ font-size:13px; color:#fde68a; text-decoration:none; border:1px solid rgba(255,255,255,.35); border-radius:8px; padding:8px 12px; }

  .date-nav{
    display:flex; align-items:center; gap:8px; margin-top:12px; background:rgba(255,255,255,.12);
    border-radius:10px; padding:8px 10px;
  }
  .date-nav button.arrow{
    border:none; background:rgba(255,255,255,.18); color:#fff; width:32px; height:32px; border-radius:8px;
    font-size:16px; font-weight:800; cursor:pointer;
  }
  .date-nav .date-label{ flex:1; text-align:center; font-size:14px; font-weight:800; }
  .date-nav .today-btn{
    border:none; background:#fde68a; color:#78350f; font-size:12px; font-weight:800; border-radius:8px;
    padding:7px 10px; cursor:pointer;
  }
  .date-nav input[type=date]{ position:absolute; opacity:0; width:0; height:0; }

  main{ flex:1; padding:14px; padding-bottom:90px; }

  .floor-block{ margin-bottom:20px; }
  .floor-title{ font-size:15px; font-weight:800; color:#78716c; margin:0 0 10px 4px; }

  .room-grid{
    display:grid; grid-template-columns:repeat(5, 1fr); gap:8px;
  }
  .room-card{
    position:relative; aspect-ratio:1/1; border-radius:12px; border:2px solid var(--gray-border);
    background:var(--gray-bg); display:flex; flex-direction:column; align-items:center; justify-content:center;
    min-height:76px; min-width:44px; cursor:pointer; touch-action:pan-y; padding:4px;
    transition:background .12s, border-color .12s;
  }
  .room-card .num{ font-size:15px; font-weight:800; color:#292524; }
  .room-card .state{ font-size:14px; font-weight:800; color:var(--gray-text); margin-top:4px; line-height:1.2; text-align:center; }
  .room-card.checked{ background:var(--amber-bg); border-color:var(--amber-border); }
  .room-card.checked .num{ color:var(--amber-text); }
  .room-card.checked .state{ color:var(--amber-text); font-weight:800; }
  .room-card .prev-badge{
    position:absolute; top:-6px; right:-4px; background:#57534e; color:#fff; font-size:9px; font-weight:800;
    padding:2px 5px; border-radius:6px; line-height:1.3;
  }
  .room-card .luggage-badge{
    position:absolute; top:-6px; left:-4px; background:#fee2e2; color:#b91c1c; font-size:9px; font-weight:800;
    padding:2px 5px; border-radius:6px; line-height:1.3; border:1px solid #fecaca;
  }
  .room-card.readonly{ cursor:default; }

  nav.tabbar{
    position:fixed; bottom:0; left:0; right:0; max-width:480px; margin:0 auto;
    display:flex; background:#fff; border-top:1px solid #e7e5e4; z-index:20;
    transform:translateZ(0); -webkit-transform:translateZ(0);
    padding-bottom:env(safe-area-inset-bottom);
  }
  nav.tabbar button{
    flex:1; border:none; background:none; padding:12px 4px 14px; font-size:13px; font-weight:700;
    color:#a8a29e; min-height:60px; cursor:pointer; display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  nav.tabbar button.active{ color:var(--accent); }
  nav.tabbar button .icon{ font-size:20px; }

  .summary-bar{
    background:#fff; border:1px solid #e7e5e4; border-radius:12px; padding:14px; margin-bottom:16px;
    display:flex; justify-content:space-around; text-align:center;
  }
  .summary-bar .item .n{ font-size:20px; font-weight:800; color:#292524; }
  .summary-bar .item.accent .n{ color:var(--accent-dark); }
  .summary-bar .item .l{ font-size:12px; color:#78716c; margin-top:2px; font-weight:600;}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(41,37,36,.5); z-index:100;
    display:none; align-items:center; justify-content:center; padding:24px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{ background:#fff; border-radius:16px; padding:24px; width:100%; max-width:340px; text-align:center; }
  .modal-box h2{ font-size:18px; margin:0 0 6px; color:#292524; }
  .modal-box .sub{ font-size:14px; color:#57534e; margin-bottom:18px; font-weight:600; }
  .price-btn-col{ display:flex; flex-direction:column; gap:8px; margin-bottom:14px; }
  .price-btn{
    border:2px solid #e7e5e4; background:#fafaf9; border-radius:12px; padding:14px; font-size:16px; font-weight:800;
    color:#292524; cursor:pointer;
  }
  .price-btn.selected{ border-color:var(--amber-border); background:var(--amber-bg); color:var(--amber-text); }
  .price-btn:active{ background:#f5f5f4; }
  .unmark-btn{
    width:100%; border:1px solid #fecaca; background:#fef2f2; color:#b91c1c; border-radius:10px;
    padding:10px; font-size:13px; font-weight:700; cursor:pointer; margin-bottom:8px;
  }
  .manual-price-row{ display:flex; gap:8px; margin-bottom:14px; }
  .manual-price-row input{
    flex:1; border:2px solid #e7e5e4; border-radius:10px; padding:12px; font-size:15px; text-align:right;
    outline:none;
  }
  .manual-price-row input:focus{ border-color:var(--accent); }
  .manual-price-row button{
    border:none; background:#57534e; color:#fff; border-radius:10px; padding:0 16px; font-size:14px; font-weight:800; cursor:pointer;
  }
  .manual-price-label{ font-size:12px; color:#78716c; text-align:left; margin:0 0 6px; font-weight:600; }
  .modal-btn-row{ display:flex; gap:10px; margin-top:6px; }
  .modal-btn{ flex:1; border:none; border-radius:12px; min-height:52px; font-size:16px; font-weight:800; cursor:pointer; }
  .modal-btn.cancel{ background:#f5f5f4; color:#57534e; }
  .modal-btn.cancel:active{ background:#e7e5e4; }
  .modal-btn.confirm{ background:var(--accent-dark); color:#fff; }
  .modal-btn.confirm:active{ background:#78350f; }
  .modal-btn.confirm[disabled]{ opacity:.6; }

  .session-item{ background:#fff; border:1px solid #e7e5e4; border-radius:12px; margin-bottom:10px; overflow:hidden; }
  .session-head{ padding:16px; display:flex; justify-content:space-between; align-items:center; cursor:pointer; min-height:44px; gap:10px; }
  .session-head .t{ font-size:15px; font-weight:800; color:#292524; }
  .session-head .s{ font-size:13px; color:#78716c; margin-top:3px; }
  .session-head .right{ display:flex; align-items:center; gap:8px; flex-shrink:0; }
  .session-head .arrow{ font-size:14px; color:#a8a29e; transition:transform .15s; }
  .session-head.open .arrow{ transform:rotate(180deg); }
  .delete-btn{
    background:#fef2f2; color:#b91c1c; border:1px solid #fecaca; border-radius:8px;
    font-size:13px; font-weight:700; padding:8px 12px; min-height:44px; cursor:pointer;
  }
  .delete-btn:active{ background:#fee2e2; }
  .session-body{ display:none; padding:0 16px 16px; }
  .session-body.open{ display:block; }
  .room-price-row{ display:flex; justify-content:space-between; font-size:13px; padding:6px 0; border-bottom:1px dashed #e7e5e4; }
  .room-price-row:last-child{ border-bottom:none; }
  .empty-msg{ text-align:center; color:#a8a29e; padding:60px 20px; font-size:14px; line-height:1.6; }

  .toast{
    position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#292524; color:#fff;
    padding:14px 22px; border-radius:12px; font-size:14px; font-weight:600; z-index:50; opacity:0; transition:opacity .2s;
    max-width:300px; text-align:center; pointer-events:none;
  }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="top-row">
      <div>
        <div class="title">🏢 벽암산업 입실기록</div>
        <div class="sub">짐체크 아님 · 터치해서 오늘 사용한 객실을 기록하세요</div>
      </div>
      <a class="back" href="index.html">← 현황</a>
    </div>
    <div class="date-nav">
      <button class="arrow" id="prevDateBtn">‹</button>
      <div class="date-label" id="dateLabel">-</div>
      <button class="arrow" id="nextDateBtn">›</button>
      <button class="today-btn" id="todayBtn">오늘</button>
      <input type="date" id="datePicker">
    </div>
  </header>

  <main id="main"></main>

  <nav class="tabbar">
    <button class="tab-btn active" data-tab="check"><span class="icon">🏢</span>입실기록</button>
    <button class="tab-btn" data-tab="history"><span class="icon">📋</span>기록보기</button>
    <button class="tab-btn" id="saveTabBtn"><span class="icon">💾</span>저장</button>
  </nav>
</div>
<div class="modal-overlay" id="actionModal">
  <div class="modal-box" id="actionModalContent"></div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

const FLOORS = [
  { name: '2층', rooms: Array.from({length:13}, (_,i)=>201+i) },
  { name: '3층', rooms: Array.from({length:10}, (_,i)=>301+i) },
  { name: '5층', rooms: Array.from({length:10}, (_,i)=>501+i) },
];
const ALL_ROOMS = FLOORS.flatMap(f=>f.rooms);

let priceMap = {};       // { "201": 40000, ... } 서버에서 조회한 객실별 기본가격
let sessions = [];       // 저장된 날짜별 세션 전체
let yesterdayUsedRooms = {}; // 선택된 날짜의 "전날" 체크됐던 객실 집합 → "어제투숙" 뱃지용
let luggageByRoom = {};  // 짐체크 앱의 가장 최근 체크 결과 { "201": {status:'짐있음'|'공실', checkedAt} } → "짐있음" 뱃지용
let rooms = {};          // 현재 선택된 날짜의 { 객실: 가격 } (체크 안 된 방은 값 없음)
ALL_ROOMS.forEach(r => rooms[r] = 0);
let dirty = false;
let currentTab = 'check';
let openSessionId = null;
let dataReady = false;
let selectedDate = todayKey();

function todayKey(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

const mainEl = document.getElementById('main');
const toastEl = document.getElementById('toast');

function showToast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  setTimeout(()=> toastEl.classList.remove('show'), 1800);
}

function fmtAmount(n){ return (n||0).toLocaleString('ko-KR')+'원'; }
function fmtDateLabel(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  const days = ['일','월','화','수','목','금','토'];
  const isToday = dateStr === todayKey();
  return `${d.getMonth()+1}월 ${d.getDate()}일(${days[d.getDay()]})` + (isToday ? ' · 오늘' : '');
}
function priceOptions(room){
  const base = priceMap[String(room)] || 0;
  return [base, base+5000, base+10000];
}

/* ── JSONP 유틸 (다른 앱과 동일한 방식) ─────────── */
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb_' + Date.now() + '_' + Math.floor(Math.random()*10000);
    const script = document.createElement('script');
    const timer = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer); delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + (url.indexOf('?') === -1 ? '?' : '&') + 'callback=' + cb;
    document.body.appendChild(script);
  });
}

function dateStrMinusOneDay(dateStr){
  const d = new Date(dateStr+'T00:00:00');
  d.setDate(d.getDate()-1);
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}

function applySessionToRoomsState(dateStr){
  ALL_ROOMS.forEach(r => rooms[r] = 0);
  const s = sessions.find(x=> x.id === dateStr);
  if(s){
    Object.keys(s.rooms).forEach(r=>{ if(ALL_ROOMS.includes(parseInt(r))) rooms[r] = s.rooms[r]; });
  }
  dirty = false;
  recomputeYesterdayUsed(dateStr);
}

function recomputeYesterdayUsed(dateStr){
  yesterdayUsedRooms = {};
  const yKey = dateStrMinusOneDay(dateStr);
  const ySession = sessions.find(x=> x.id === yKey);
  if(ySession){
    Object.keys(ySession.rooms||{}).forEach(r=>{ if(ySession.rooms[r]) yesterdayUsedRooms[r] = true; });
  }
}

async function loadAll(){
  const [priceRes, sessRes, luggageRes] = await Promise.allSettled([
    fetchJsonp(API + '?action=byeokam_prices'),
    fetchJsonp(API + '?action=byeokam_sessions'),
    fetchJsonp(API + '?action=byeokam_luggage')
  ]);
  if(priceRes.status === 'fulfilled') priceMap = priceRes.value || {};
  else showToast('가격 정보를 불러오지 못했습니다');

  if(sessRes.status === 'fulfilled') sessions = sessRes.value || [];
  else showToast('기록을 불러오지 못했습니다');

  if(luggageRes.status === 'fulfilled') luggageByRoom = luggageRes.value || {};
  // 짐체크 정보는 참고용 뱃지라 실패해도 별도 토스트 없이 조용히 넘어감

  applySessionToRoomsState(selectedDate);
  dataReady = true;
  updateDateHeader();
  render();
}

function attachTapHandler(el, onTap){
  let startX=0, startY=0, tracking=false;
  const THRESHOLD = 10;
  el.addEventListener('pointerdown', (e)=>{ startX=e.clientX; startY=e.clientY; tracking=true; });
  el.addEventListener('pointerup', (e)=>{
    if(!tracking) return;
    tracking = false;
    const dist = Math.sqrt((e.clientX-startX)**2 + (e.clientY-startY)**2);
    if(dist < THRESHOLD) onTap();
  });
  el.addEventListener('pointercancel', ()=>{ tracking = false; });
}

function renderCheckScreen(){
  let html = '';
  FLOORS.forEach(f=>{
    html += `<div class="floor-block"><div class="floor-title">${f.name}</div><div class="room-grid">`;
    f.rooms.forEach(r=>{
      const checked = rooms[r] > 0;
      const wasUsedYesterday = !!yesterdayUsedRooms[r];
      const hasLuggage = luggageByRoom[r] && luggageByRoom[r].status === '짐있음';
      html += `<div class="room-card ${checked?'checked':''}" data-room="${r}">
        ${hasLuggage ? '<div class="luggage-badge">짐있음</div>' : ''}
        ${wasUsedYesterday ? '<div class="prev-badge">어제투숙</div>' : ''}
        <div class="num">${r}</div>
        <div class="state">${checked ? fmtAmount(rooms[r]) : '-'}</div>
      </div>`;
    });
    html += `</div></div>`;
  });
  mainEl.innerHTML = html;
  mainEl.querySelectorAll('.room-card').forEach(card=>{
    attachTapHandler(card, ()=> openActionModal(card.dataset.room));
  });
}

function openActionModal(room){
  const current = rooms[room] || 0;
  const opts = priceOptions(room);
  const box = document.getElementById('actionModalContent');
  const priceBtnsHtml = opts.map(function(p){
    return `<button class="price-btn ${p===current?'selected':''}" data-price="${p}">${fmtAmount(p)}</button>`;
  }).join('');
  box.innerHTML = `
    <h2>${room}호</h2>
    <div class="sub">벽암산업 고객 입실을 기록할까요?</div>
    <div class="price-btn-col">${priceBtnsHtml}</div>
    <div class="manual-price-label">직접입력 (원)</div>
    <div class="manual-price-row">
      <input type="number" id="manualPriceInput" inputmode="numeric" placeholder="예: 47000" value="${current||''}">
      <button id="manualPriceBtn">적용</button>
    </div>
    ${current ? '<button class="unmark-btn" id="unmarkBtn">이 객실 체크 해제</button>' : ''}
    <div class="modal-btn-row">
      <button class="modal-btn cancel" id="modalCancelBtn">취소</button>
    </div>
  `;
  document.getElementById('modalCancelBtn').addEventListener('click', closeActionModal);
  box.querySelectorAll('.price-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      rooms[room] = parseInt(btn.dataset.price)||0;
      dirty = true;
      closeActionModal();
      renderCheckScreen();
    });
  });
  document.getElementById('manualPriceBtn').addEventListener('click', ()=>{
    const val = parseInt(document.getElementById('manualPriceInput').value) || 0;
    if(val <= 0){ showToast('금액을 입력해주세요'); return; }
    rooms[room] = val;
    dirty = true;
    closeActionModal();
    renderCheckScreen();
  });
  const unmarkBtn = document.getElementById('unmarkBtn');
  if(unmarkBtn){
    unmarkBtn.addEventListener('click', ()=>{
      rooms[room] = 0;
      dirty = true;
      closeActionModal();
      renderCheckScreen();
    });
  }
  document.getElementById('actionModal').classList.add('open');
}

function closeActionModal(){
  document.getElementById('actionModal').classList.remove('open');
}

function renderHistoryScreen(){
  if(sessions.length === 0){
    mainEl.innerHTML = `<div class="empty-msg">아직 저장된 기록이 없습니다.<br>입실기록 탭에서 체크 후 '저장'으로 기록을 저장해보세요.</div>`;
    return;
  }
  const sorted = [...sessions].sort((a,b)=> b.id.localeCompare(a.id));
  const grandTotal = sorted.reduce((sum,s)=> sum + Object.values(s.rooms||{}).reduce((a,b)=>a+(b||0),0), 0);
  let html = `<div class="summary-bar">
    <div class="item accent"><div class="n">${fmtAmount(grandTotal)}</div><div class="l">전체 합계</div></div>
    <div class="item"><div class="n">${sorted.length}</div><div class="l">기록된 날짜 수</div></div>
  </div>`;
  sorted.forEach(s=>{
    const roomEntries = Object.keys(s.rooms||{}).filter(r=> s.rooms[r]).sort((a,b)=>parseInt(a)-parseInt(b));
    const total = roomEntries.reduce((sum,r)=> sum + s.rooms[r], 0);
    const isOpen = openSessionId === s.id;
    html += `<div class="session-item">
      <div class="session-head ${isOpen?'open':''}" data-id="${s.id}">
        <div><div class="t">${fmtDateLabel(s.id)}</div>
        <div class="s">${roomEntries.length}개 객실 · ${fmtAmount(total)}</div></div>
        <div class="right">
          <button class="delete-btn" data-id="${s.id}" data-delete="1">삭제</button>
          <div class="arrow">▼</div>
        </div>
      </div>
      <div class="session-body ${isOpen?'open':''}" id="body-${s.id}"></div>
    </div>`;
  });
  mainEl.innerHTML = html;
  sorted.forEach(s=>{
    if(openSessionId === s.id){
      const roomEntries = Object.keys(s.rooms||{}).filter(r=> s.rooms[r]).sort((a,b)=>parseInt(a)-parseInt(b));
      const rowsHtml = roomEntries.length
        ? roomEntries.map(r=> `<div class="room-price-row"><span>${r}호</span><span>${fmtAmount(s.rooms[r])}</span></div>`).join('')
        : '<div style="font-size:13px;color:#a8a29e;padding:8px 0;">체크된 객실이 없습니다</div>';
      document.getElementById(`body-${s.id}`).innerHTML = rowsHtml;
    }
  });
  mainEl.querySelectorAll('.session-head').forEach(head=>{
    head.addEventListener('click', ()=>{
      const id = head.dataset.id;
      openSessionId = (openSessionId === id) ? null : id;
      renderHistoryScreen();
    });
  });
  mainEl.querySelectorAll('.delete-btn').forEach(btn=>{
    btn.addEventListener('click', (e)=>{
      e.stopPropagation();
      handleDeleteSession(btn.dataset.id);
    });
  });
}

function openConfirmModal(message, onYes){
  document.getElementById('actionModalContent').innerHTML = `
    <h2>${message}</h2>
    <div class="modal-btn-row">
      <button class="modal-btn cancel" id="confirmNoBtn">아니오</button>
      <button class="modal-btn confirm" id="confirmYesBtn">예</button>
    </div>
  `;
  document.getElementById('confirmNoBtn').addEventListener('click', closeActionModal);
  document.getElementById('confirmYesBtn').addEventListener('click', async ()=>{
    const btn = document.getElementById('confirmYesBtn');
    btn.disabled = true;
    btn.textContent = '처리 중...';
    await onYes();
    closeActionModal();
  });
  document.getElementById('actionModal').classList.add('open');
}

async function handleDeleteSession(dayKey){
  openConfirmModal('이 날짜 기록을 삭제하시겠습니까?', async ()=>{
    try{
      await fetch(API, {
        method: 'POST', mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: 'action=byeokam_delete&dayKey=' + encodeURIComponent(dayKey)
      });
      sessions = sessions.filter(s=> s.id !== dayKey);
      recomputeYesterdayUsed(selectedDate);
      if(openSessionId === dayKey) openSessionId = null;
      if(dayKey === selectedDate) applySessionToRoomsState(selectedDate);
      renderHistoryScreen();
      showToast('기록이 삭제되었습니다');
    }catch(e){
      console.error(e);
      showToast('삭제에 실패했습니다');
    }
  });
}

function renderSaveModalContent(){
  const roomEntries = ALL_ROOMS.filter(r=> rooms[r] > 0);
  const total = roomEntries.reduce((sum,r)=> sum + rooms[r], 0);
  document.getElementById('actionModalContent').innerHTML = `
    <h2>${fmtDateLabel(selectedDate)} 기록을 저장할까요?</h2>
    <div class="summary-bar">
      <div class="item"><div class="n">${roomEntries.length}</div><div class="l">체크된 객실</div></div>
      <div class="item accent"><div class="n">${fmtAmount(total)}</div><div class="l">합계 금액</div></div>
    </div>
    <div class="modal-btn-row">
      <button class="modal-btn cancel" id="modalCancelBtn">취소</button>
      <button class="modal-btn confirm" id="modalConfirmBtn">저장</button>
    </div>
  `;
  document.getElementById('modalCancelBtn').addEventListener('click', closeActionModal);
  document.getElementById('modalConfirmBtn').addEventListener('click', async ()=>{
    const btn = document.getElementById('modalConfirmBtn');
    btn.disabled = true;
    btn.textContent = '저장 중...';
    await doSave();
    closeActionModal();
  });
}

function openSaveModal(){
  renderSaveModalContent();
  document.getElementById('actionModal').classList.add('open');
}

async function doSave(){
  const toSave = {};
  ALL_ROOMS.forEach(r=>{ if(rooms[r] > 0) toSave[r] = rooms[r]; });
  try{
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=byeokam_save&date=' + encodeURIComponent(selectedDate) + '&rooms=' + encodeURIComponent(JSON.stringify(toSave))
    });
    dirty = false;
    showToast('저장되었습니다');
    setTimeout(async ()=>{
      const res = await fetchJsonp(API + '?action=byeokam_sessions').catch(()=>null);
      if(res){ sessions = res; recomputeYesterdayUsed(selectedDate); }
      render();
    }, 1200);
  }catch(e){
    console.error(e);
    showToast('저장에 실패했습니다. 다시 시도해주세요');
  }
}

function updateDateHeader(){
  document.getElementById('dateLabel').textContent = fmtDateLabel(selectedDate) + (dirty ? ' (저장 안 됨)' : '');
  document.getElementById('datePicker').value = selectedDate;
}

function changeDate(newDate){
  const go = ()=>{
    selectedDate = newDate;
    applySessionToRoomsState(selectedDate);
    updateDateHeader();
    render();
  };
  if(dirty){
    if(confirm('저장하지 않은 변경사항이 있습니다. 이동하면 사라집니다. 이동할까요?')) go();
  }else{
    go();
  }
}

document.getElementById('prevDateBtn').addEventListener('click', ()=>{
  const d = new Date(selectedDate+'T00:00:00'); d.setDate(d.getDate()-1);
  changeDate(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
});
document.getElementById('nextDateBtn').addEventListener('click', ()=>{
  const d = new Date(selectedDate+'T00:00:00'); d.setDate(d.getDate()+1);
  changeDate(d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'));
});
document.getElementById('todayBtn').addEventListener('click', ()=> changeDate(todayKey()));
document.getElementById('datePicker').addEventListener('change', function(){
  if(this.value) changeDate(this.value);
});
document.getElementById('dateLabel').addEventListener('click', ()=> document.getElementById('datePicker').showPicker && document.getElementById('datePicker').showPicker());

function render(){
  if(!dataReady){
    mainEl.innerHTML = `<div class="empty-msg">불러오는 중...</div>`;
    return;
  }
  document.querySelectorAll('.tab-btn[data-tab]').forEach(b=> b.classList.toggle('active', b.dataset.tab === currentTab));
  updateDateHeader();
  if(currentTab === 'check') renderCheckScreen();
  else if(currentTab === 'history') renderHistoryScreen();
}

document.querySelectorAll('.tab-btn[data-tab]').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    currentTab = btn.dataset.tab;
    render();
  });
});

document.getElementById('saveTabBtn').addEventListener('click', openSaveModal);

// 접속 직후 하단 고정 탭바가 눌리지 않는 iOS Safari 이슈 방지용
window.addEventListener('load', function () {
  setTimeout(function () {
    window.scrollTo(0, 1);
    window.scrollTo(0, 0);
  }, 100);
});

loadAll();
</script>
</body>
</html>
