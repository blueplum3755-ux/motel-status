<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>입실체크</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
  --border: #2d3148; --text: #e8eaf0; --text-sub: #7b80a0; --accent: #6c7aff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; color: var(--text); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.back-link { font-size: 12px; color: var(--text-sub); text-decoration: none; }
.header-title { font-size: 17px; font-weight: 800; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 8px; }
.month-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 12px; font-size: 15px; cursor: pointer; }
.month-label { font-size: 15px; font-weight: 700; min-width: 96px; text-align: center; }

/* ── 탭 바 ── */
.tab-bar { flex-shrink: 0; display: flex; background: #12151f; border-bottom: 2px solid var(--border); }
.tab-btn { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 700; color: #6b7199; cursor: pointer; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #fff; border-bottom-color: var(--accent); }

/* ── 컨텐츠 ── */
.content { flex: 1; overflow: hidden; }
.tab-panel { display: none; height: 100%; flex-direction: column; }
.tab-panel.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }

/* ── 날짜 선택 (체크 탭) ── */
.date-bar { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; display: flex; align-items: center; gap: 10px; }
.date-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 7px 12px; font-size: 14px; cursor: pointer; }
.date-input-wrap { flex: 1; }
.date-input-wrap input[type=date] { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; outline: none; -webkit-appearance: none; }
.date-input-wrap input[type=date]:focus { border-color: var(--accent); }
.today-btn { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ── 고객 블록 (체크 탭) ── */
.client-block { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 12px; overflow: hidden; }
.client-header { padding: 12px 14px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
.client-name { font-size: 15px; font-weight: 700; }
.client-day-total { font-size: 13px; color: #4ade80; font-weight: 700; }
.room-check-row { padding: 10px 14px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.room-check-row:last-child { border-bottom: none; }
.room-check-row.checked { background: #0a1f12; }

/* 체크 토글 */
.check-toggle { width: 44px; height: 44px; border-radius: 10px; border: 2px solid var(--border); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; flex-shrink: 0; }
.check-toggle.on { border-color: #4ade80; background: #0d2b1a; }

/* 객실 정보 */
.room-info { flex: 1; min-width: 0; }
.room-num  { font-size: 16px; font-weight: 700; }
.room-num.checked { color: #4ade80; }
.room-price-label { font-size: 11px; color: var(--text-sub); margin-top: 2px; }

/* 인원 조절 */
.person-ctrl { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.person-ctrl.hidden { visibility: hidden; }
.p-btn { width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 18px; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.p-btn:active { background: var(--accent); border-color: var(--accent); color: #fff; }
.p-val { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
.p-unit { font-size: 11px; color: var(--text-sub); }

/* 금액 표시 */
.room-amount-col { text-align: right; flex-shrink: 0; min-width: 68px; }
.room-base-amt { font-size: 13px; font-weight: 700; color: var(--text); }
.room-extra-amt { font-size: 10px; color: #fde047; margin-top: 2px; }
.room-total-amt { font-size: 13px; font-weight: 800; color: #4ade80; margin-top: 3px; }

/* ── 장부 탭 ── */
.ledger-header { padding: 10px 14px 0; flex-shrink: 0; }
.filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
.filter-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; }
.total-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.total-label { font-size: 12px; color: var(--text-sub); }
.total-amount { font-size: 20px; font-weight: 800; color: #4ade80; }
.check-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.check-table th { padding: 7px 4px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
.check-table td { padding: 9px 4px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.check-table tr:last-child td { border-bottom: none; }
.num-right { text-align: right; white-space: nowrap; }
.del-btn { background: none; border: none; color: #3a3f60; font-size: 18px; cursor: pointer; padding: 0 2px; }
.del-btn:active { color: #f87171; }
.cell-main { font-size: 13px; font-weight: 600; }
.cell-sub  { font-size: 10px; color: var(--text-sub); margin-top: 2px; }

/* ── 정산 탭 ── */
.client-summary-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.cs-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
.cs-name { font-size: 16px; font-weight: 700; }
.cs-count { font-size: 12px; color: var(--text-sub); }
.cs-total { font-size: 24px; font-weight: 800; color: #4ade80; margin-bottom: 10px; }
.cs-room-row { display: flex; justify-content: space-between; font-size: 12px; padding: 4px 0; border-top: 1px solid var(--border); }
.cs-room-name { color: var(--text-sub); }
.cs-room-amt  { color: var(--text); font-weight: 600; }
.print-btn { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; background: transparent; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; margin-top: 10px; }
.excel-btn-wrap { margin-bottom: 14px; }
.excel-btn { width: 100%; padding: 14px; border: 1px solid #1a5c35; border-radius: 10px; background: #001a0a; color: #4ade80; font-size: 15px; font-weight: 700; cursor: pointer; }

/* ── 설정 탭 ── */
.settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.settings-title { font-size: 13px; font-weight: 700; margin-bottom: 10px; }
.client-block-s { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: var(--bg); }
.client-block-s-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.client-block-s-name { font-size: 15px; font-weight: 700; }
.room-area { padding-left: 10px; border-left: 2px solid var(--border); }
.room-chip-row { display: flex; flex-wrap: wrap; gap: 6px; min-height: 16px; margin-bottom: 6px; }
.room-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; }
.room-chip-num   { font-weight: 700; }
.room-chip-price { color: var(--text-sub); }
.room-chip-del   { background: none; border: none; color: #3a3f60; font-size: 14px; cursor: pointer; padding: 0; line-height: 1; }
.room-chip-del:active { color: #f87171; }
.room-none { font-size: 11px; color: #3a3f60; font-style: italic; }
.room-add-row { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
.room-add-row input { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 13px; outline: none; }
.room-add-row input:focus { border-color: var(--accent); }
.room-add-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-sub); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.room-add-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
.add-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.add-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 9px 10px; font-size: 14px; outline: none; }
.add-row input:focus { border-color: var(--accent); }
.add-btn { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.s-del-btn { background: none; border: none; color: #3a3f60; font-size: 18px; cursor: pointer; padding: 0 4px; }
.s-del-btn:active { color: #f87171; }

/* ── 거래명세서 ── */
#printArea { display: none; position: fixed; inset: 0; background: #fff; color: #000; z-index: 999; overflow: auto; padding: 24px; font-family: 'Malgun Gothic', sans-serif; }
.print-close  { position: fixed; top: 12px; right: 12px; background: #333; color: #fff; border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 13px; }
.print-action { display: inline-block; margin-bottom: 12px; margin-right: 8px; background: #1a1d27; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
.명세서-title { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 6px; }
.명세서-sub   { text-align: center; font-size: 13px; color: #555; margin-bottom: 14px; }
.명세서-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.명세서-table th, .명세서-table td { border: 1px solid #bbb; padding: 6px 8px; }
.명세서-table th { background: #f5f5f5; font-weight: bold; text-align: center; }
.명세서-table td { text-align: center; }
.명세서-table td.right { text-align: right; }
.명세서-total { text-align: right; margin-top: 12px; font-size: 15px; font-weight: bold; }
@media print { .print-close, .print-action { display: none !important; } }

/* ── 빈 상태 / 토스트 ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 13px; line-height: 1.8; }
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 300; transition: transform 0.25s; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <a class="back-link" href="index.html">← 현황</a>
    <div class="header-title">📋 입실체크</div>
    <div style="width:44px"></div>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-btn active" data-tab="check"    onclick="switchTab('check')">체크</div>
  <div class="tab-btn"        data-tab="ledger"   onclick="switchTab('ledger')">장부</div>
  <div class="tab-btn"        data-tab="settle"   onclick="switchTab('settle')">정산</div>
  <div class="tab-btn"        data-tab="settings" onclick="switchTab('settings')">⚙ 설정</div>
</div>

<div class="content">

  <!-- ── 체크 탭 ── -->
  <div class="tab-panel active" id="tab-check">
    <div class="date-bar">
      <button class="date-btn" onclick="shiftDate(-1)">◀</button>
      <div class="date-input-wrap">
        <input type="date" id="checkDate" onchange="onDateChange()">
      </div>
      <button class="date-btn" onclick="shiftDate(1)">▶</button>
      <button class="today-btn" onclick="goToday()">오늘</button>
    </div>
    <div class="scroll-area" id="checkScroll">
      <div id="checkContent"></div>
    </div>
  </div>

  <!-- ── 장부 탭 ── -->
  <div class="tab-panel" id="tab-ledger">
    <div class="ledger-header">
      <div class="filter-row">
        <select class="filter-select" id="filterClient" onchange="renderLedger()">
          <option value="">전체 업체</option>
        </select>
        <select class="filter-select" id="filterRoom" onchange="renderLedger()" style="flex:0.6">
          <option value="">전체 객실</option>
        </select>
      </div>
      <div class="total-bar">
        <div class="total-label" id="totalLabel">합계</div>
        <div class="total-amount" id="totalAmount">-</div>
      </div>
    </div>
    <div class="scroll-area" style="padding-top:4px">
      <table class="check-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th>업체/객실</th>
            <th>인원</th>
            <th class="num-right">기본</th>
            <th class="num-right">추가</th>
            <th class="num-right">합계</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
      <div id="ledgerEmpty" class="empty-state" style="display:none">이번달 기록이 없습니다</div>
    </div>
  </div>

  <!-- ── 정산 탭 ── -->
  <div class="tab-panel" id="tab-settle">
    <div class="scroll-area">
      <div class="excel-btn-wrap">
        <button class="excel-btn" onclick="downloadExcel()">📥 전체 엑셀 다운로드</button>
      </div>
      <div id="clientSummary"></div>
    </div>
  </div>

  <!-- ── 설정 탭 ── -->
  <div class="tab-panel" id="tab-settings">
    <div class="scroll-area">
      <div class="settings-section">
        <div class="settings-title">🏢 업체 · 객실 관리</div>
        <div id="clientManageList"></div>
        <div class="add-row">
          <input id="newClientInput" placeholder="업체명 입력">
          <button class="add-btn" onclick="addClient()">추가</button>
        </div>
      </div>
      <div class="settings-section" style="background:var(--surface2);border-style:dashed;font-size:12px;color:var(--text-sub);line-height:1.7">
        <b style="color:var(--text)">💡 객실 단가 안내</b><br>
        기본 2인 기준 단가 입력 (예: 50000)<br>
        추가 인원은 1인당 자동으로 10,000원 가산
      </div>
    </div>
  </div>

</div>

<!-- 거래명세서 -->
<div id="printArea">
  <button class="print-close" onclick="closePrint()">✕ 닫기</button>
  <button class="print-action" onclick="window.print()">🖨 인쇄</button>
  <div id="printContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';
const EXTRA_PERSON_RATE = 10000;

let records = [];           // 이번달 전체 기록 (서버)
let checkDateRecords = {};  // { "room_num": record } 오늘 날짜 기준
let currentMonth = new Date(); currentMonth.setDate(1);

// ── localStorage ───────────────────────────
// clients: [{name, rooms:[{num, price}]}]
function getClients() {
  return JSON.parse(localStorage.getItem('ci_clients') || '[]');
}
function saveClients(c) { localStorage.setItem('ci_clients', JSON.stringify(c)); }

// ── 초기화 ─────────────────────────────────
function init() {
  document.getElementById('checkDate').value = toDateStr(new Date());
  renderMonthLabel();
  loadData();
  renderSettings();
}

function toDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}
function getMonthStr() {
  return currentMonth.getFullYear() + '-' + String(currentMonth.getMonth()+1).padStart(2,'0');
}
function getMonthDisplay() {
  return currentMonth.getFullYear() + '년 ' + (currentMonth.getMonth()+1) + '월';
}

// ── 월 / 날짜 이동 ─────────────────────────
function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+dir, 1);
  renderMonthLabel();
  loadData();
}
function renderMonthLabel() {
  document.getElementById('monthLabel').textContent = getMonthDisplay();
}
function shiftDate(delta) {
  var d = new Date(document.getElementById('checkDate').value);
  d.setDate(d.getDate() + delta);
  document.getElementById('checkDate').value = toDateStr(d);
  onDateChange();
}
function goToday() {
  document.getElementById('checkDate').value = toDateStr(new Date());
  onDateChange();
}
function onDateChange() {
  renderCheckTab();
}

// ── JSONP ──────────────────────────────────
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    var cb = 'cb_' + Date.now();
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 14000);
    window[cb] = function(data){ cleanup(); resolve(data); };
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
    script.onerror = function(){ cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 데이터 로드 ────────────────────────────
async function loadData() {
  try {
    var data = await fetchJsonp(API + '?action=checkin_list&month=' + getMonthStr());
    records = data.records || [];
    renderAll();
  } catch(e) {
    showToast('로드 실패: ' + e.message);
    records = [];
    renderAll();
  }
}

function renderAll() {
  renderCheckTab();
  renderLedger();
  renderSettle();
  renderLedgerFilters();
}

// ── 체크 탭 ────────────────────────────────
function renderCheckTab() {
  var dateStr = document.getElementById('checkDate').value;
  var clients = getClients();
  var todayRecs = records.filter(function(r){ return r.date === dateStr; });
  // roomNum → record map
  var todayMap = {};
  todayRecs.forEach(function(r){ todayMap[r.room] = r; });

  if (!clients.length) {
    document.getElementById('checkContent').innerHTML =
      '<div class="empty-state">⚙ 설정 탭에서 업체와 객실을 등록해주세요</div>';
    return;
  }

  var html = clients.map(function(client) {
    if (!client.rooms || !client.rooms.length) return '';
    var dayTotal = 0;
    client.rooms.forEach(function(rm) {
      var rec = todayMap[rm.num];
      if (rec) dayTotal += rec.total;
    });
    var rows = client.rooms.map(function(rm) {
      var rec = todayMap[rm.num];
      var isOn = !!rec;
      var persons = rec ? rec.persons : 2;
      var baseAmt = rm.price;
      var extraAmt = Math.max(0, persons - 2) * EXTRA_PERSON_RATE;
      var totalAmt = baseAmt + extraAmt;
      return '<div class="room-check-row' + (isOn ? ' checked' : '') + '">'
        + '<div class="check-toggle' + (isOn ? ' on' : '') + '" onclick="toggleRoom(\'' + esc(client.name) + '\',\'' + esc(rm.num) + '\',' + rm.price + ')">'
        + (isOn ? '✓' : '') + '</div>'
        + '<div class="room-info">'
        +   '<div class="room-num' + (isOn ? ' checked' : '') + '">' + rm.num + '호</div>'
        +   '<div class="room-price-label">기본 ' + fmt(rm.price) + '원 / 2인</div>'
        + '</div>'
        + '<div class="person-ctrl' + (isOn ? '' : ' hidden') + '">'
        +   '<button class="p-btn" onclick="changePerson(\'' + esc(client.name) + '\',\'' + esc(rm.num) + '\',' + rm.price + ',-1)">−</button>'
        +   '<span class="p-val">' + persons + '</span>'
        +   '<span class="p-unit">인</span>'
        +   '<button class="p-btn" onclick="changePerson(\'' + esc(client.name) + '\',\'' + esc(rm.num) + '\',' + rm.price + ',1)">+</button>'
        + '</div>'
        + '<div class="room-amount-col">'
        + (isOn
            ? '<div class="room-base-amt">' + fmt(baseAmt) + '</div>'
            + (extraAmt > 0 ? '<div class="room-extra-amt">+' + fmt(extraAmt) + '</div>' : '')
            + '<div class="room-total-amt">' + fmt(totalAmt) + '원</div>'
            : '')
        + '</div>'
        + '</div>';
    }).join('');
    return '<div class="client-block">'
      + '<div class="client-header">'
      +   '<div class="client-name">' + client.name + '</div>'
      +   (dayTotal > 0 ? '<div class="client-day-total">' + fmt(dayTotal) + '원</div>' : '')
      + '</div>'
      + rows
      + '</div>';
  }).join('');

  document.getElementById('checkContent').innerHTML = html || '<div class="empty-state">등록된 객실이 없습니다</div>';
}

// ── 체크 토글 ──────────────────────────────
async function toggleRoom(clientName, roomNum, roomPrice) {
  var dateStr = document.getElementById('checkDate').value;
  var todayRecs = records.filter(function(r){ return r.date === dateStr; });
  var existing = todayRecs.find(function(r){ return r.room === roomNum; });

  if (existing) {
    // 이미 체크됨 → 삭제
    if (!confirm(dateStr + '  ' + roomNum + '호 체크를 취소할까요?')) return;
    await deleteRecord(existing.id, true);
  } else {
    // 미체크 → 추가 (기본 2인)
    await saveCheck(dateStr, clientName, roomNum, roomPrice, 2);
  }
}

async function changePerson(clientName, roomNum, roomPrice, delta) {
  var dateStr = document.getElementById('checkDate').value;
  var existing = records.find(function(r){ return r.date === dateStr && r.room === roomNum; });
  if (!existing) return;
  var newPersons = Math.max(1, existing.persons + delta);
  if (newPersons === existing.persons) return;
  // 기존 삭제 후 새로 저장
  await deleteRecord(existing.id, true);
  await saveCheck(dateStr, clientName, roomNum, roomPrice, newPersons);
}

async function saveCheck(date, clientName, room, price, persons) {
  var extraAmt = Math.max(0, persons - 2) * EXTRA_PERSON_RATE;
  var total    = price + extraAmt;
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=checkin_add'
        + '&date='    + encodeURIComponent(date)
        + '&client='  + encodeURIComponent(clientName)
        + '&room='    + encodeURIComponent(room)
        + '&price='   + price
        + '&persons=' + persons
        + '&extra='   + extraAmt
        + '&total='   + total
    });
    setTimeout(loadData, 1200);
  } catch(e) { showToast('저장 오류'); }
}

async function deleteRecord(rowId, silent) {
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=checkin_delete&rowId=' + rowId
    });
    if (!silent) { showToast('삭제 완료'); setTimeout(loadData, 1200); }
  } catch(e) { if (!silent) showToast('삭제 오류'); }
}

// ── 장부 필터 ──────────────────────────────
function renderLedgerFilters() {
  var clients = [...new Set(records.map(function(r){ return r.client; }).filter(Boolean))].sort();
  var rooms   = [...new Set(records.map(function(r){ return r.room;   }).filter(Boolean))].sort();
  var curC = document.getElementById('filterClient').value;
  var curR = document.getElementById('filterRoom').value;
  document.getElementById('filterClient').innerHTML = '<option value="">전체 업체</option>'
    + clients.map(function(c){ return '<option value="'+c+'"'+(c===curC?' selected':'')+'>'+c+'</option>'; }).join('');
  document.getElementById('filterRoom').innerHTML = '<option value="">전체 객실</option>'
    + rooms.map(function(r){ return '<option value="'+r+'"'+(r===curR?' selected':'')+'>'+(r+'호')+'</option>'; }).join('');
}

// ── 장부 렌더 ──────────────────────────────
function renderLedger() {
  var fc = document.getElementById('filterClient').value;
  var fr = document.getElementById('filterRoom').value;
  var filtered = records.filter(function(r){
    return (!fc || r.client === fc) && (!fr || r.room === fr);
  }).slice().sort(function(a,b){ return a.date.localeCompare(b.date)||(a.id-b.id); });

  var total = filtered.reduce(function(s,r){ return s+r.total; }, 0);
  document.getElementById('totalLabel').textContent = (fc||fr) ? (fc||'전체')+' '+(fr ? fr+'호' : '') : getMonthDisplay()+' 합계';
  document.getElementById('totalAmount').textContent = fmt(total)+'원';

  var body  = document.getElementById('ledgerBody');
  var empty = document.getElementById('ledgerEmpty');
  if (!filtered.length) { body.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  body.innerHTML = filtered.map(function(r) {
    return '<tr>'
      + '<td style="font-size:11px;white-space:nowrap">' + r.date.slice(5) + '</td>'
      + '<td><div class="cell-main">' + r.client + '</div><div class="cell-sub">' + r.room + '호</div></td>'
      + '<td style="text-align:center">' + r.persons + '인</td>'
      + '<td class="num-right">' + fmt(r.price) + '</td>'
      + '<td class="num-right" style="color:#fde047">' + (r.extra > 0 ? '+'+fmt(r.extra) : '-') + '</td>'
      + '<td class="num-right" style="color:#4ade80;font-weight:700">' + fmt(r.total) + '</td>'
      + '<td><button class="del-btn" onclick="confirmDelete('+r.id+')">×</button></td>'
      + '</tr>';
  }).join('');
}

async function confirmDelete(rowId) {
  if (!confirm('이 기록을 삭제할까요?')) return;
  await deleteRecord(rowId, false);
}

// ── 정산 렌더 ──────────────────────────────
function renderSettle() {
  var clients = [...new Set(records.map(function(r){ return r.client; }).filter(Boolean))].sort();
  var container = document.getElementById('clientSummary');
  if (!clients.length) { container.innerHTML='<div class="empty-state">이번달 기록이 없습니다</div>'; return; }

  container.innerHTML = clients.map(function(c) {
    var cr = records.filter(function(r){ return r.client===c; });
    var total = cr.reduce(function(s,r){ return s+r.total; }, 0);
    var rooms = [...new Set(cr.map(function(r){ return r.room; }))].sort();
    var roomRows = rooms.map(function(rm) {
      var rmRecs = cr.filter(function(r){ return r.room===rm; });
      var rmTotal = rmRecs.reduce(function(s,r){ return s+r.total; }, 0);
      return '<div class="cs-room-row"><div class="cs-room-name">' + rm + '호  ('+rmRecs.length+'박)</div><div class="cs-room-amt">'+fmt(rmTotal)+'원</div></div>';
    }).join('');
    return '<div class="client-summary-card">'
      + '<div class="cs-header"><div class="cs-name">'+c+'</div><div class="cs-count">'+cr.length+'박</div></div>'
      + '<div class="cs-total">'+fmt(total)+'원</div>'
      + roomRows
      + '<button class="print-btn" onclick="printClient(\''+esc(c)+'\')">🖨 거래명세서 출력</button>'
      + '</div>';
  }).join('');
}

// ── 거래명세서 ─────────────────────────────
function printClient(clientName) {
  var cr = records.filter(function(r){ return r.client===clientName; })
    .sort(function(a,b){ return a.date.localeCompare(b.date)||(a.room.localeCompare(b.room)); });
  var grandTotal = 0;
  var rows = cr.map(function(r) {
    grandTotal += r.total;
    return '<tr>'
      + '<td>' + r.date + '</td>'
      + '<td>' + r.room + '호</td>'
      + '<td>' + r.persons + '인</td>'
      + '<td class="right">' + fmt(r.price) + '</td>'
      + '<td class="right">' + (r.extra > 0 ? fmt(r.extra) : '-') + '</td>'
      + '<td class="right">' + fmt(r.total) + '</td>'
      + '</tr>';
  }).join('');

  // 박수 집계
  var rooms = [...new Set(cr.map(function(r){ return r.room; }))].sort();
  var roomSummary = rooms.map(function(rm) {
    var cnt = cr.filter(function(r){ return r.room===rm; }).length;
    return rm+'호 '+cnt+'박';
  }).join('  /  ');

  document.getElementById('printContent').innerHTML =
    '<div class="명세서-title">거 래 명 세 서</div>'
    + '<div class="명세서-sub">공급받는자: ' + clientName + '&nbsp;&nbsp;|&nbsp;&nbsp;기간: ' + getMonthDisplay() + '</div>'
    + '<div class="명세서-sub" style="color:#333">' + roomSummary + '</div>'
    + '<table class="명세서-table">'
    + '<thead><tr><th>날짜</th><th>객실</th><th>인원</th><th>기본금액</th><th>추가인원금액</th><th>합계금액</th></tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table>'
    + '<div class="명세서-total">합계: ' + fmt(grandTotal) + '원</div>';
  document.getElementById('printArea').style.display = 'block';
}
function closePrint() { document.getElementById('printArea').style.display='none'; }

// ── 엑셀 다운로드 ──────────────────────────
function downloadExcel() {
  if (!records.length) { showToast('데이터가 없습니다'); return; }
  var wb = XLSX.utils.book_new();
  var clients = [...new Set(records.map(function(r){ return r.client; }).filter(Boolean))].sort();
  clients.forEach(function(c) {
    var cr = records.filter(function(r){ return r.client===c; })
      .sort(function(a,b){ return a.date.localeCompare(b.date)||(a.room.localeCompare(b.room)); });
    var rows = [['날짜','객실','인원','기본금액','추가인원금액','합계금액']];
    cr.forEach(function(r){ rows.push([r.date, r.room+'호', r.persons, r.price, r.extra, r.total]); });
    rows.push(['','','','','합계', cr.reduce(function(s,r){return s+r.total;},0)]);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:13},{wch:7},{wch:5},{wch:12},{wch:14},{wch:12}];
    XLSX.utils.book_append_sheet(wb, ws, c.slice(0,31));
  });
  XLSX.writeFile(wb, '입실체크_'+getMonthStr()+'.xlsx');
  showToast('엑셀 다운로드 완료');
}

// ── 설정 탭 ────────────────────────────────
function renderSettings() {
  var clients = getClients();
  document.getElementById('clientManageList').innerHTML = clients.length
    ? clients.map(function(c, ci) {
        var roomHtml = c.rooms && c.rooms.length
          ? c.rooms.map(function(rm, ri) {
              return '<div class="room-chip">'
                + '<span class="room-chip-num">' + rm.num + '호</span>'
                + '<span class="room-chip-price">' + fmt(rm.price) + '원</span>'
                + '<button class="room-chip-del" onclick="removeRoomFromClient('+ci+','+ri+')">×</button>'
                + '</div>';
            }).join('')
          : '<span class="room-none">(객실 없음)</span>';
        return '<div class="client-block-s">'
          + '<div class="client-block-s-header">'
          +   '<div class="client-block-s-name">' + c.name + '</div>'
          +   '<button class="s-del-btn" onclick="removeClient('+ci+')">×</button>'
          + '</div>'
          + '<div class="room-area">'
          +   '<div class="room-chip-row">' + roomHtml + '</div>'
          +   '<div class="room-add-row">'
          +     '<input id="newRoom_'+ci+'" placeholder="객실번호" style="width:80px" onkeydown="if(event.key===\'Enter\')document.getElementById(\'newPrice_'+ci+'\').focus()">'
          +     '<input id="newPrice_'+ci+'" type="number" placeholder="단가(원)" style="width:90px" inputmode="numeric" onkeydown="if(event.key===\'Enter\')addRoomToClient('+ci+')">'
          +     '<button class="room-add-btn" onclick="addRoomToClient('+ci+')">+ 객실</button>'
          +   '</div>'
          + '</div>'
          + '</div>';
      }).join('')
    : '<div style="font-size:12px;color:var(--text-sub);padding:8px 0">등록된 업체 없음</div>';
}

function addClient() {
  var n = document.getElementById('newClientInput').value.trim();
  if (!n) return;
  var clients = getClients();
  if (clients.find(function(c){ return c.name===n; })) { showToast('이미 등록된 업체입니다'); return; }
  clients.push({ name: n, rooms: [] });
  saveClients(clients);
  document.getElementById('newClientInput').value = '';
  renderSettings();
}
function removeClient(idx) {
  if (!confirm('업체를 삭제할까요? (기존 기록은 유지됩니다)')) return;
  var clients = getClients();
  clients.splice(idx, 1);
  saveClients(clients);
  renderSettings();
}
function addRoomToClient(ci) {
  var numEl   = document.getElementById('newRoom_'+ci);
  var priceEl = document.getElementById('newPrice_'+ci);
  var num   = numEl.value.trim();
  var price = parseInt(priceEl.value, 10) || 0;
  if (!num)   { showToast('객실번호를 입력해주세요'); return; }
  if (!price) { showToast('단가를 입력해주세요'); return; }
  var clients = getClients();
  if (!clients[ci]) return;
  if (clients[ci].rooms.find(function(r){ return r.num===num; })) { showToast('이미 등록된 객실입니다'); return; }
  clients[ci].rooms.push({ num: num, price: price });
  saveClients(clients);
  numEl.value = ''; priceEl.value = '';
  renderSettings();
}
function removeRoomFromClient(ci, ri) {
  var clients = getClients();
  if (!clients[ci]) return;
  clients[ci].rooms.splice(ri, 1);
  saveClients(clients);
  renderSettings();
}

// ── 유틸 ──────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString('ko-KR'); }
function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
  if (tab==='ledger') renderLedgerFilters();
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

init();
</script>
