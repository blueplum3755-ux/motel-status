<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>객실 현황</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222536;
  --border: #2d3148;
  --text: #e8eaf0;
  --text-sub: #7b80a0;
  --accent: #6c7aff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; color: var(--text); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 16px; }
.header-top { display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.available-badge { display: flex; align-items: baseline; gap: 6px; }
.available-num { font-size: 36px; font-weight: 800; color: #4ade80; line-height: 1; }
.available-label { font-size: 13px; color: var(--text-sub); }
.header-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; flex-shrink: 0; }
.refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }
.updated-at { font-size: 11px; color: var(--text-sub); }
.stat-row { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; justify-content: center; }
.stat-chip { display: flex; align-items: center; gap: 5px; background: var(--surface2); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--text-sub); }
.stat-dot { width: 7px; height: 7px; border-radius: 50%; }

/* ── 탭 바 (상단: 현황/청소/예약) ── */
.tab-bar { flex-shrink: 0; display: flex; background: #12151f; border-bottom: 2px solid var(--border); }
.tab-btn { flex: 1; padding: 12px 0; text-align: center; font-size: 15px; font-weight: 700; color: #6b7199; cursor: pointer; border-bottom: 3px solid transparent; letter-spacing: 0.02em; }
.tab-btn.active { color: #ffffff; border-bottom-color: var(--accent); }

/* ── 컨텐츠 ── */
.content { flex: 1; overflow: hidden; }
.tab-panel { display: none; height: 100%; flex-direction: column; }
.tab-panel.active { display: flex; }

/* ── 상태 탭 (하단: 장기·재숙·입실/공실/예약) ── */
.status-tabs { flex-shrink: 0; display: flex; background: #1e2235; border-bottom: 1px solid var(--border); }
.status-tab { flex: 1; padding: 9px 6px; font-size: 13px; font-weight: 600; color: #8890b5; cursor: pointer; text-align: center; border-bottom: 2px solid transparent; letter-spacing: 0.01em; }
.status-tab.active { color: #c8ccf0; border-bottom-color: var(--accent); background: #252a42; }

/* ── 객실 그리드 ── */
.floor-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 12px; }
.room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media (min-width: 480px) { .room-grid { grid-template-columns: repeat(4, 1fr); } }
@media (min-width: 768px) { .room-grid { grid-template-columns: repeat(5, 1fr); } }

.room-card { border-radius: 12px; border: 1px solid; padding: 10px 8px; min-height: 78px; display: flex; flex-direction: column; gap: 3px; position: relative; }
.room-card.vacant   { background: #0d2b1a; border-color: #1a5c35; }
.room-card.dirty    { background: #2b1500; border-color: #5c3500; }
.room-card.stay     { background: #0d1b3b; border-color: #1e3a7a; }
.room-card.long     { background: #2b0d0d; border-color: #5c1a1a; }
.room-card.reserved { background: #1f1a00; border-color: #5c4e00; }
.room-card.luggage  { background: #0d2429; border-color: #1a5c52; }

.room-number { font-size: 18px; font-weight: 700; line-height: 1; }
.room-card.vacant   .room-number { color: #4ade80; }
.room-card.dirty    .room-number { color: #fb923c; }
.room-card.stay     .room-number { color: #60a5fa; }
.room-card.long     .room-number { color: #f87171; }
.room-card.reserved .room-number { color: #fcd34d; }
.room-card.luggage  .room-number { color: #2dd4bf; }

.room-status { font-size: 11px; font-weight: 600; }
.room-card.vacant   .room-status { color: #4ade80; }
.room-card.dirty    .room-status { color: #fb923c; }
.room-card.stay     .room-status { color: #60a5fa; }
.room-card.long     .room-status { color: #f87171; }
.room-card.reserved .room-status { color: #fcd34d; }
.room-card.luggage  .room-status { color: #2dd4bf; }

.room-sub { font-size: 10px; color: #e0e2ee; }
.occupied-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 5px #4ade80; }

/* ── 청소 탭 ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 10px 12px; }
.section-title { font-size: 12px; font-weight: 600; color: var(--text-sub); letter-spacing: 0.04em; padding: 6px 2px 8px; }
.clean-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
@media (min-width: 480px) { .clean-grid { grid-template-columns: repeat(4, 1fr); } }
.clean-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 8px; display: flex; flex-direction: column; gap: 4px; }
.clean-card.need { border-color: #5c3500; background: #1a0e00; }
.clean-card.done { border-color: #1a5c35; background: #001a0d; }
.clean-room { font-size: 20px; font-weight: 700; }
.clean-card.need .clean-room { color: #fb923c; }
.clean-card.done .clean-room { color: #4ade80; }
.clean-info { font-size: 11px; color: var(--text-sub); }
.clean-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 20px; align-self: flex-start; }
.badge-need { background: #3d1500; color: #fb923c; }
.badge-done { background: #002d1a; color: #4ade80; }

/* ── 예약 탭 ── */
.reserve-actions { display: flex; gap: 10px; padding: 12px 16px; flex-shrink: 0; }
.btn-reserve { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; }
.btn-reserve.primary { background: #1a3a5c; color: #60a5fa; }
.btn-reserve.danger  { background: #3b0d0d; color: #f87171; }
.reservation-list { padding: 0 12px 12px; display: flex; flex-direction: column; gap: 6px; }
.reservation-item { background: var(--surface); border: 1px solid #5c4e00; border-radius: 10px; padding: 12px 14px; }
.reservation-room { font-size: 16px; font-weight: 700; color: #fcd34d; }
.reservation-info { font-size: 12px; color: var(--text-sub); margin-top: 4px; }
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 14px; }

/* ── 그룹 구분선 ── */
.group-divider { grid-column: 1 / -1; display: flex; align-items: center; gap: 8px; padding: 4px 0 2px; }
.group-divider-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.06em; white-space: nowrap; }
.group-divider-line { flex: 1; height: 1px; background: var(--border); }
.group-divider-count { font-size: 11px; color: var(--text-sub); }

/* ── 로딩 ── */
.loading { display: flex; justify-content: center; align-items: center; height: 160px; color: var(--text-sub); font-size: 14px; }

/* ── 모달 ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 100; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom, 0px)); width: 100%; max-width: 480px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; text-align: center; }
.modal-room-list { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 14px; max-height: 180px; overflow-y: auto; }
.modal-room-btn { padding: 10px 6px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 14px; font-weight: 600; text-align: center; cursor: pointer; }
.modal-room-btn.selected { border-color: var(--accent); background: #1a1d40; color: var(--accent); }
.kind-row { display: flex; gap: 8px; margin-bottom: 12px; }
.kind-btn { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-sub); font-size: 14px; font-weight: 600; cursor: pointer; }
.kind-btn.selected { border-color: var(--accent); background: #1a1d40; color: var(--accent); }
.modal-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 12px; font-size: 14px; margin-bottom: 10px; outline: none; }
.modal-input:focus { border-color: var(--accent); }
.modal-input::placeholder { color: var(--text-sub); }
.modal-footer { display: flex; gap: 10px; }
.btn-cancel { flex: 1; padding: 14px; background: var(--surface2); border: none; border-radius: 10px; color: var(--text); font-size: 15px; font-weight: 600; cursor: pointer; }
.btn-confirm { flex: 2; padding: 14px; background: var(--accent); border: none; border-radius: 10px; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }
.btn-confirm.danger { background: #c0392b; }

/* ── 짐체크 탭 ── */
.lug-notif-bar { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #12151f; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-sub); cursor: pointer; flex-shrink: 0; }
.lug-notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3f60; flex-shrink: 0; }
.lug-notif-dot.on { background: #4ade80; box-shadow: 0 0 5px #4ade80; }
.lug-header { padding: 10px 14px 8px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
.lug-header-title { font-size: 14px; font-weight: 700; color: var(--text); }
.lug-date { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.lug-save-btn { background: var(--accent); color: #fff; border: none; border-radius: 8px; padding: 7px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }
.lug-section { padding: 8px 12px 4px; font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.05em; text-transform: uppercase; }
.lug-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 4px 12px 14px; }
@media (min-width: 480px) { .lug-grid { grid-template-columns: repeat(4, 1fr); } }
.lug-card { border-radius: 12px; border: 1px solid; padding: 10px 8px 8px; display: flex; flex-direction: column; gap: 4px; }
.lug-card.waiting    { background: #2b1800; border-color: #6b3f00; }
.lug-card.ready      { background: #001a0a; border-color: #1a5c35; }
.lug-card.checked-yes { background: #0d2429; border-color: #1a5c52; }
.lug-card.checked-no  { background: #181a27; border-color: #2d3148; }
.lug-room { font-size: 20px; font-weight: 700; }
.lug-card.waiting     .lug-room { color: #fb923c; }
.lug-card.ready       .lug-room { color: #4ade80; }
.lug-card.checked-yes .lug-room { color: #2dd4bf; }
.lug-card.checked-no  .lug-room { color: #6b7199; }
.lug-status { font-size: 10px; font-weight: 600; color: var(--text-sub); }
.lug-btns { display: flex; gap: 4px; margin-top: 2px; }
.lug-btn { flex: 1; padding: 5px 0; border-radius: 6px; border: 1px solid; font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-sub); border-color: var(--border); }
.lug-btn.yes { border-color: #1a5c52; color: #2dd4bf; }
.lug-btn.yes.active { background: #0d2429; }
.lug-btn.no.active  { background: #1a1d27; border-color: #4b5180; color: var(--text); }
.lug-empty { text-align: center; padding: 30px 16px; color: var(--text-sub); font-size: 13px; line-height: 1.6; grid-column: 1/-1; }
.lug-scroll { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 200; transition: transform 0.25s; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- 헤더 -->
<div class="header">
  <div class="header-top">
    <div class="available-badge">
      <div class="available-num" id="availableNum">-</div>
      <div class="available-label">판매가능</div>
    </div>
    <div class="stat-row" id="statRow"></div>
    <div class="header-right">
      <button class="refresh-btn" onclick="loadData()">↻ 새로고침</button>
      <div class="updated-at" id="updatedAt">불러오는 중...</div>
    </div>
  </div>
</div>

<!-- 탭 바 -->
<div class="tab-bar">
  <div class="tab-btn active" data-tab="status" onclick="switchTab('status')">현황</div>
  <div class="tab-btn" data-tab="cleaning" onclick="switchTab('cleaning')">청소</div>
  <div class="tab-btn" data-tab="reservation" onclick="switchTab('reservation')">예약하기</div>
  <div class="tab-btn" data-tab="luggage" onclick="switchTab('luggage')">짐체크</div>
</div>

<!-- 컨텐츠 -->
<div class="content">

  <!-- 현황 탭 -->
  <div class="tab-panel active" id="tab-status">
    <div class="status-tabs" id="statusTabs">
      <div class="status-tab active" data-status="all" onclick="selectStatusTab('all')">전체</div>
      <div class="status-tab" data-status="occupied" onclick="selectStatusTab('occupied')">장기·재숙·입실</div>
      <div class="status-tab" data-status="vacant" onclick="selectStatusTab('vacant')">공실</div>
      <div class="status-tab" data-status="reserved" onclick="selectStatusTab('reserved')">예약</div>
    </div>
    <div class="floor-content">
      <div class="room-grid" id="roomGrid">
        <div class="loading" style="grid-column:1/-1">불러오는 중...</div>
      </div>
    </div>
  </div>

  <!-- 청소 탭 -->
  <div class="tab-panel" id="tab-cleaning">
    <div class="scroll-area">
      <div class="section-title">청소 필요</div>
      <div class="clean-grid" id="cleanNeedList"></div>
      <div class="section-title">청소 완료</div>
      <div class="clean-grid" id="cleanDoneList"></div>
    </div>
  </div>

  <!-- 짐체크 탭 -->
  <div class="tab-panel" id="tab-luggage">
    <div class="lug-notif-bar" id="notifBar" onclick="toggleNotification()">
      <div class="lug-notif-dot" id="notifDot"></div>
      <span id="notifLabel">탭하여 퇴실 알림 허용</span>
    </div>
    <div class="lug-header">
      <div>
        <div class="lug-header-title">짐 체크 현황</div>
        <div class="lug-date" id="lugDate"></div>
      </div>
      <button class="lug-save-btn" onclick="saveLuggageResults()">저장</button>
    </div>
    <div class="lug-scroll">
      <div class="lug-section" id="lugWaitSection">대기중 (아직 투숙중)</div>
      <div class="lug-grid" id="lugWaitGrid"></div>
      <div class="lug-section" id="lugReadySection">체크 가능 (퇴실완료)</div>
      <div class="lug-grid" id="lugReadyGrid"></div>
    </div>
  </div>

  <!-- 예약 탭 -->
  <div class="tab-panel" id="tab-reservation">
    <div class="reserve-actions">
      <button class="btn-reserve primary" onclick="openReserveModal()">＋ 예약 추가</button>
      <button class="btn-reserve danger"  onclick="openCancelModal()">예약 취소</button>
    </div>
    <div class="scroll-area">
      <div class="section-title">현재 예약</div>
      <div class="reservation-list" id="reservationList"></div>
    </div>
  </div>

</div>

<!-- 예약 추가 모달 -->
<div class="modal-overlay" id="reserveModal" onclick="closeOutside(event,'reserveModal')">
  <div class="modal">
    <div class="modal-title">예약 추가</div>
    <div class="modal-room-list" id="reserveRoomList"></div>
    <input class="modal-input" id="reserveMemo" type="text" placeholder="메모 (선택)">
    <div class="modal-footer">
      <button class="btn-cancel"  onclick="closeModal('reserveModal')">취소</button>
      <button class="btn-confirm" onclick="submitReservation()">예약</button>
    </div>
  </div>
</div>

<!-- 예약 취소 모달 -->
<div class="modal-overlay" id="cancelModal" onclick="closeOutside(event,'cancelModal')">
  <div class="modal">
    <div class="modal-title">예약 취소</div>
    <div class="modal-room-list" id="cancelRoomList"></div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal('cancelModal')">닫기</button>
      <button class="btn-confirm danger" onclick="submitCancel()">취소 확인</button>
    </div>
  </div>
</div>

<!-- 토스트 -->
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

let allRooms = [];
let currentStatusTab = 'all';
let selectedKind = '숙박';
let selectedReserveRoom = null;
let selectedCancelRoom = null;
let refreshTimer = null;

// ── JSONP 유틸 ──────────────────────────────
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    var cb = 'cb_' + Date.now();
    var script = document.createElement('script');
    var timer = setTimeout(function() {
      cleanup(); reject(new Error('timeout'));
    }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 데이터 로드 ─────────────────────────────
async function loadData() {
  document.getElementById('updatedAt').textContent = '불러오는 중...';
  let data = null;
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      data = await fetchJsonp(API + '?action=data');
      break;
    } catch (e) {
      if (attempt === 2) {
        document.getElementById('updatedAt').textContent = '오류: ' + e.message;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadData, 60000);
        return;
      }
      document.getElementById('updatedAt').textContent = '재시도 중...';
    }
  }
  allRooms = data.rooms || [];
  const t = (data.updatedAt || '').substring(5, 16);
  document.getElementById('updatedAt').textContent = 'RMS: ' + t;
  updateLuggageTracking();
  renderAll();
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

// ── 탭 전환 ────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  if (tab === 'luggage') clearLuggageBadge();
}

// ── 분류 ───────────────────────────────────
function classify(r) {
  if (r.type === 'long')   return 'long';
  if (r.type === 'normal') return 'stay';
  if (r.isReserved)        return 'reserved';
  if (r.checkinLabel === '재숙') return 'luggage';
  if (r.needsClean)        return 'dirty';
  return 'vacant';
}

function statusLabel(cls, r) {
  const map = { vacant:'공실', dirty:'청소필요', stay: r.checkinLabel || '입실중', long: r.occupied ? '장기(在)' : '장기', reserved:'예약', luggage:'재숙' };
  return map[cls] || cls;
}

// ── 렌더링 ─────────────────────────────────
function renderAll() {
  renderHeader();
  renderStatusTabs();
  renderGrid();
  renderCleaning();
  renderReservations();
  renderLuggageCheck();
}

function renderHeader() {
  const vacant = allRooms.filter(r => classify(r) === 'vacant').length;
  document.getElementById('availableNum').textContent = vacant;

  const chips = [
    { label:'입실중', count: allRooms.filter(r => r.type === 'normal').length, color:'#60a5fa' },
    { label:'장기',   count: allRooms.filter(r => r.type === 'long').length,   color:'#f87171' },
    { label:'청소필요',count: allRooms.filter(r => r.needsClean).length,       color:'#fb923c' },
    { label:'예약',   count: allRooms.filter(r => r.isReserved).length,        color:'#fcd34d' },
    { label:'재숙',   count: allRooms.filter(r => r.checkinLabel === '재숙').length, color:'#2dd4bf' },
  ].filter(c => c.count > 0);

  document.getElementById('statRow').innerHTML = chips.map(c =>
    `<div class="stat-chip"><div class="stat-dot" style="background:${c.color}"></div>${c.label} ${c.count}</div>`
  ).join('');
}

function renderStatusTabs() {
  document.querySelectorAll('.status-tab').forEach(t =>
    t.classList.toggle('active', t.dataset.status === currentStatusTab)
  );
}

function selectStatusTab(s) { currentStatusTab = s; renderStatusTabs(); renderGrid(); }

function getRoomsForTab(tab) {
  if (tab === 'all')      return allRooms;
  if (tab === 'occupied') return allRooms.filter(r => r.type === 'long' || r.type === 'normal' || r.checkinLabel === '재숙');
  if (tab === 'vacant')   return allRooms.filter(r => r.type === 'empty' && r.checkinLabel !== '재숙' && !r.isReserved);
  if (tab === 'reserved') return allRooms.filter(r => r.isReserved);
  return allRooms;
}

const SORT_ORDER = { reserved: 0, vacant: 1, long: 2, luggage: 3, stay: 4, dirty: 5 };

function renderGrid() {
  const rooms = getRoomsForTab(currentStatusTab)
    .slice()
    .sort((a, b) => {
      const oa = SORT_ORDER[classify(a)] ?? 9;
      const ob = SORT_ORDER[classify(b)] ?? 9;
      return oa !== ob ? oa - ob : a.room.localeCompare(b.room);
    });
  if (!rooms.length) {
    document.getElementById('roomGrid').innerHTML = '<div class="loading" style="grid-column:1/-1">객실 없음</div>';
    return;
  }
  const GROUP_LABEL = { reserved:'예약', vacant:'공실', long:'장기', luggage:'재숙', stay:'입실중', dirty:'청소필요' };
  let lastCls = null;
  const html = [];
  rooms.forEach(r => {
    const cls = classify(r);
    if (cls !== lastCls) {
      const count = rooms.filter(x => classify(x) === cls).length;
      html.push(`<div class="group-divider">
        <span class="group-divider-label">${GROUP_LABEL[cls] || cls}</span>
        <span class="group-divider-line"></span>
        <span class="group-divider-count">${count}</span>
      </div>`);
      lastCls = cls;
    }
    const label = statusLabel(cls, r);
    const sub = r.checkinTime
      ? (r.checkoutTime ? r.checkinTime + ' → ' + r.checkoutTime : r.checkinTime)
      : '';
    html.push(`<div class="room-card ${cls}">
      ${r.occupied ? '<div class="occupied-dot"></div>' : ''}
      <div class="room-number">${r.room}</div>
      <div class="room-status">${label}</div>
      ${sub ? `<div class="room-sub">${sub}</div>` : ''}
      ${r.displayMemo ? `<div class="room-sub">${r.displayMemo}</div>` : ''}
    </div>`);
  });
  document.getElementById('roomGrid').innerHTML = html.join('');
}

function renderCleaning() {
  const need = allRooms.filter(r => r.needsClean);
  const done = allRooms.filter(r => !r.needsClean && r.rawCleaningEndTime);

  document.getElementById('cleanNeedList').innerHTML = need.length
    ? need.map(r => `<div class="clean-card need">
        <div class="clean-room">${r.room}호</div>
        <div class="clean-info">${r.checkinLabel || ''}${r.checkoutTime ? ' ' + r.checkoutTime : ''}</div>
        <span class="clean-badge badge-need">청소필요</span>
      </div>`).join('')
    : '<div class="empty-state" style="grid-column:1/-1">청소 필요 없음 ✓</div>';

  document.getElementById('cleanDoneList').innerHTML = done.length
    ? done.map(r => `<div class="clean-card done">
        <div class="clean-room">${r.room}호</div>
        <span class="clean-badge badge-done">완료</span>
      </div>`).join('')
    : '<div class="empty-state" style="grid-column:1/-1">청소 완료 내역 없음</div>';
}

function renderReservations() {
  const list = allRooms.filter(r => r.isReserved);
  document.getElementById('reservationList').innerHTML = list.length
    ? list.map(r => `<div class="reservation-item">
        <div class="reservation-room">${r.room}호</div>
        <div class="reservation-info">${[r.reservationName, r.reservationPhone].filter(Boolean).join(' · ') || '정보없음'}</div>
      </div>`).join('')
    : '<div class="empty-state">예약 없음</div>';
}

// ── 예약 추가 ──────────────────────────────
function openReserveModal() {
  selectedReserveRoom = null;
  document.getElementById('reserveMemo').value = '';

  const rooms = allRooms.filter(r => classify(r) === 'vacant' || classify(r) === 'dirty');
  document.getElementById('reserveRoomList').innerHTML = rooms.length
    ? rooms.map(r => `<div class="modal-room-btn" data-room="${r.room}" onclick="pickReserveRoom(this,'${r.room}')">${r.room}</div>`).join('')
    : '<div style="color:var(--text-sub);font-size:13px;grid-column:1/-1;padding:8px">공실 없음</div>';

  openModal('reserveModal');
}

function pickReserveRoom(el, room) {
  selectedReserveRoom = room;
  document.querySelectorAll('#reserveRoomList .modal-room-btn').forEach(b => b.classList.toggle('selected', b.dataset.room === room));
}

async function submitReservation() {
  if (!selectedReserveRoom) { showToast('객실을 선택해주세요'); return; }
  const memo = document.getElementById('reserveMemo').value.trim();
  closeModal('reserveModal');

  const r = allRooms.find(r => r.room === selectedReserveRoom);
  if (r) { r.isReserved = true; renderAll(); }

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `action=reserve_request&room=${encodeURIComponent(selectedReserveRoom)}&kind=%EC%98%88%EC%95%BD&memo=${encodeURIComponent(memo)}`
    });
    showToast(selectedReserveRoom + '호 예약 요청 완료');
  } catch (e) {
    showToast('전송 오류 — 잠시 후 확인해주세요');
  }
}

// ── 예약 취소 ──────────────────────────────
function openCancelModal() {
  selectedCancelRoom = null;
  const rooms = allRooms.filter(r => r.isReserved);
  document.getElementById('cancelRoomList').innerHTML = rooms.length
    ? rooms.map(r => `<div class="modal-room-btn" data-room="${r.room}" onclick="pickCancelRoom(this,'${r.room}')">${r.room}</div>`).join('')
    : '<div style="color:var(--text-sub);font-size:13px;grid-column:1/-1;padding:8px">예약 없음</div>';
  openModal('cancelModal');
}

function pickCancelRoom(el, room) {
  selectedCancelRoom = room;
  document.querySelectorAll('#cancelRoomList .modal-room-btn').forEach(b => b.classList.toggle('selected', b.dataset.room === room));
}

async function submitCancel() {
  if (!selectedCancelRoom) { showToast('취소할 객실을 선택해주세요'); return; }
  closeModal('cancelModal');

  const r = allRooms.find(r => r.room === selectedCancelRoom);
  if (r) { r.isReserved = false; r.reservationPhone = ''; renderAll(); }

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `action=reserve_request&room=${encodeURIComponent(selectedCancelRoom)}&kind=%EC%B7%A8%EC%86%8C`
    });
    showToast(selectedCancelRoom + '호 예약 취소 완료');
  } catch (e) {
    showToast('전송 오류 — 잠시 후 확인해주세요');
  }
}

// ── 모달 유틸 ──────────────────────────────
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeOutside(e, id) { if (e.target === document.getElementById(id)) closeModal(id); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── 짐체크 상태 ────────────────────────────
let luggageTargets = new Set();
let luggageWaiting = new Set();
let luggageChecked = {};

function initLuggageState() {
  const today = new Date().toLocaleDateString('ko-KR');
  if (sessionStorage.getItem('luggageDate') === today) {
    luggageTargets = new Set(JSON.parse(sessionStorage.getItem('luggageTargets') || '[]'));
    luggageWaiting = new Set(JSON.parse(sessionStorage.getItem('luggageWaiting') || '[]'));
    luggageChecked = JSON.parse(sessionStorage.getItem('luggageChecked') || '{}');
  } else {
    luggageTargets = new Set();
    luggageWaiting = new Set();
    luggageChecked = {};
    sessionStorage.setItem('luggageDate', today);
  }
}

function saveLuggageSession() {
  const today = new Date().toLocaleDateString('ko-KR');
  sessionStorage.setItem('luggageDate', today);
  sessionStorage.setItem('luggageTargets', JSON.stringify([...luggageTargets]));
  sessionStorage.setItem('luggageWaiting', JSON.stringify([...luggageWaiting]));
  sessionStorage.setItem('luggageChecked', JSON.stringify(luggageChecked));
}

function updateLuggageTracking() {
  // '어제입실' 방을 대상에 추가
  allRooms.filter(r => r.checkinLabel === '어제입실').forEach(r => {
    luggageTargets.add(r.room);
  });

  // 현재 투숙중인 대상 방
  const nowWaiting = new Set(
    allRooms.filter(r => r.type === 'normal' && luggageTargets.has(r.room)).map(r => r.room)
  );

  // 이전엔 대기중이었다가 지금은 사라진 방 = 퇴실 → 알림
  luggageWaiting.forEach(room => {
    if (!nowWaiting.has(room)) fireCheckoutAlert(room);
  });

  luggageWaiting = nowWaiting;
  saveLuggageSession();
}

function fireCheckoutAlert(room) {
  playBeep();
  if (Notification.permission === 'granted') {
    new Notification('🛎 짐체크 필요', {
      body: room + '호 퇴실 확인 — 짐 확인해주세요',
      requireInteraction: true
    });
  }
  showLuggageBadge();
  showToast('🔔 ' + room + '호 퇴실 — 짐체크 필요!');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 180, 360].forEach(delay => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 900;
      osc.type = 'sine';
      const t = ctx.currentTime + delay / 1000;
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.4);
    });
  } catch (e) {}
}

let luggageBadge = false;
function showLuggageBadge() {
  luggageBadge = true;
  const btn = document.querySelector('[data-tab="luggage"]');
  if (btn) btn.textContent = '짐체크 🔔';
}
function clearLuggageBadge() {
  luggageBadge = false;
  const btn = document.querySelector('[data-tab="luggage"]');
  if (btn) btn.textContent = '짐체크';
}

async function toggleNotification() {
  const perm = Notification.permission;
  if (perm === 'granted') {
    showToast('알림이 이미 허용되어 있습니다 ✓');
  } else if (perm === 'denied') {
    showToast('브라우저 설정에서 알림을 허용해주세요');
  } else {
    await Notification.requestPermission();
    renderNotifBar();
    if (Notification.permission === 'granted') showToast('알림 허용됨 ✓');
  }
}

function renderNotifBar() {
  const dot = document.getElementById('notifDot');
  const label = document.getElementById('notifLabel');
  if (!dot || !label) return;
  const perm = Notification.permission;
  if (perm === 'granted') {
    dot.className = 'lug-notif-dot on';
    label.textContent = '알림 허용됨 — 퇴실 감지 시 자동 알림';
  } else if (perm === 'denied') {
    dot.className = 'lug-notif-dot';
    label.textContent = '알림 차단됨 — 브라우저 설정에서 허용 필요';
  } else {
    dot.className = 'lug-notif-dot';
    label.textContent = '탭하여 퇴실 알림 허용';
  }
}

function setLuggage(room, val) {
  luggageChecked[room] = val;
  saveLuggageSession();
  renderLuggageCheck();
}

function renderLuggageCheck() {
  const today = new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
  const elDate = document.getElementById('lugDate');
  if (elDate) elDate.textContent = today;
  renderNotifBar();

  const targets = [...luggageTargets];
  const waitGrid  = document.getElementById('lugWaitGrid');
  const readyGrid = document.getElementById('lugReadyGrid');
  const waitSec   = document.getElementById('lugWaitSection');
  const readySec  = document.getElementById('lugReadySection');
  if (!waitGrid) return;

  const waiting = allRooms.filter(r => targets.includes(r.room) && r.type === 'normal')
    .sort((a, b) => a.room.localeCompare(b.room));
  const ready = allRooms.filter(r => targets.includes(r.room) && r.type === 'empty')
    .sort((a, b) => a.room.localeCompare(b.room));

  if (targets.length === 0) {
    waitSec.style.display = 'none';
    readySec.style.display = 'none';
    waitGrid.innerHTML = '';
    readyGrid.innerHTML = '<div class="lug-empty">어제 입실 객실이 없거나<br>아직 데이터가 갱신되지 않았습니다<br><span style="font-size:11px;color:#4b5180">오전 9시 이후 자동 표시됩니다</span></div>';
    return;
  }

  waitSec.style.display = waiting.length ? 'block' : 'none';
  readySec.style.display = ready.length  ? 'block' : 'none';

  waitGrid.innerHTML = waiting.map(r =>
    `<div class="lug-card waiting">
      <div class="lug-room">${r.room}</div>
      <div class="lug-status">🟠 아직 투숙중</div>
    </div>`
  ).join('');

  readyGrid.innerHTML = ready.map(r => {
    const chk = luggageChecked[r.room];
    const cls = chk === 'yes' ? 'checked-yes' : chk === 'no' ? 'checked-no' : 'ready';
    return `<div class="lug-card ${cls}">
      <div class="lug-room">${r.room}</div>
      <div class="lug-status">🟢 퇴실완료</div>
      <div class="lug-btns">
        <button class="lug-btn yes${chk === 'yes' ? ' active' : ''}" onclick="setLuggage('${r.room}','yes')">짐있음</button>
        <button class="lug-btn no${chk === 'no' ? ' active' : ''}" onclick="setLuggage('${r.room}','no')">없음</button>
      </div>
    </div>`;
  }).join('');
}

async function saveLuggageResults() {
  const entries = Object.entries(luggageChecked);
  if (!entries.length) { showToast('체크된 항목이 없습니다'); return; }
  const date = new Date().toLocaleDateString('ko-KR');
  const results = entries.map(([room, val]) => room + '=' + val).join(',');
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=luggage_check&date=' + encodeURIComponent(date) + '&results=' + encodeURIComponent(results)
    });
    showToast('짐체크 기록 저장 완료 ✓');
  } catch (e) {
    showToast('저장 오류 — 잠시 후 확인해주세요');
  }
}

// ── 초기 로드 ──────────────────────────────
initLuggageState();
loadData();
</script>
