<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>м§җ мІҙнҒ¬</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* в”Җв”Җ н—ӨлҚ” в”Җв”Җ */
.header {
  flex-shrink: 0;
  background: #fff;
  border-bottom: 1px solid #e0e4ed;
  padding: 12px 16px 10px;
}
.header-row1 { display: flex; justify-content: space-between; align-items: center; }
.h-title { font-size: 22px; font-weight: 900; color: #1a1a2e; white-space: nowrap; }
.refresh-btn {
  background: #f0f2f5; border: 1px solid #d0d5e8; color: #444;
  border-radius: 10px; padding: 8px 14px; font-size: 20px; cursor: pointer;
  flex-shrink: 0;
}
.header-row2 { margin-top: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.h-date { font-size: 15px; font-weight: 700; color: #333; white-space: nowrap; }
.h-rms  { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* в”Җв”Җ мҡ”м•Ҫ л°” в”Җв”Җ */
.summary-bar {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #fff;
  border-bottom: 2px solid #e0e4ed;
}
.s-chip { text-align: center; padding: 10px 4px; border-right: 1px solid #e0e4ed; }
.s-chip:last-child { border-right: none; }
.s-num   { font-size: 26px; font-weight: 900; line-height: 1; }
.s-label { font-size: 11px; color: #888; margin-top: 3px; white-space: nowrap; }
.c-occupied { color: #dc2626; }
.c-todo     { color: #d97706; }
.c-yes      { color: #dc2626; }
.c-no       { color: #16a34a; }

/* в”Җв”Җ мҠӨнҒ¬лЎӨ мҳҒм—ӯ в”Җв”Җ */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 100px;
}

/* в”Җв”Җ мёө м„№м…ҳ в”Җв”Җ */
.floor-section { padding: 0 12px 16px; }
.floor-label {
  font-size: 16px; font-weight: 900; color: #555;
  padding: 14px 4px 8px;
  white-space: nowrap;
}

/* в”Җв”Җ м№ҙл“ң к·ёлҰ¬л“ң (3м—ҙ) в”Җв”Җ */
.card-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
}

/* в”Җв”Җ м№ҙл“ң кіөнҶө в”Җв”Җ */
.lug-card {
  border-radius: 14px;
  border: 2.5px solid;
  padding: 12px 6px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  min-height: 80px;
  transition: transform 0.1s;
}
.lug-card.tappable { cursor: pointer; }
.lug-card.tappable:active { transform: scale(0.94); }

.lug-room {
  font-size: 28px;
  font-weight: 900;
  line-height: 1;
  white-space: nowrap;
}
.lug-status {
  font-size: 12px;
  font-weight: 700;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}
.lug-hint {
  font-size: 10px;
  color: #999;
  white-space: nowrap;
}

/* в”Җв”Җ мһ…мӢӨмӨ‘ в”Җв”Җ */
.card-occupied {
  background: #fef2f2;
  border-color: #fca5a5;
}
.card-occupied .lug-room   { color: #dc2626; }
.card-occupied .lug-status { color: #ef4444; }

/* в”Җв”Җ нҷ•мқён•„мҡ” в”Җв”Җ */
.card-todo {
  background: #fffbeb;
  border-color: #fcd34d;
}
.card-todo .lug-room   { color: #92400e; }
.card-todo .lug-status { color: #d97706; }

/* в”Җв”Җ м§җмһҲмқҢ в”Җв”Җ */
.card-yes {
  background: #fff0f0;
  border-color: #f87171;
}
.card-yes .lug-room   { color: #dc2626; }
.card-yes .lug-status { color: #dc2626; }
.card-yes .lug-hint   { color: #f87171; }

/* в”Җв”Җ м§җм—ҶмқҢ в”Җв”Җ */
.card-no {
  background: #f0fdf4;
  border-color: #86efac;
}
.card-no .lug-room   { color: #166534; }
.card-no .lug-status { color: #16a34a; }
.card-no .lug-hint   { color: #86efac; }

/* в”Җв”Җ кіөмӢӨ в”Җв”Җ */
.card-empty {
  background: #f9fafb;
  border-color: #e5e7eb;
  opacity: 0.6;
}
.card-empty .lug-room   { color: #9ca3af; }
.card-empty .lug-status { color: #9ca3af; }

/* в”Җв”Җ м ҖмһҘ л°” в”Җв”Җ */
.save-bar {
  flex-shrink: 0;
  padding: 10px 14px;
  padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px));
  background: #fff;
  border-top: 2px solid #e0e4ed;
  display: flex;
  gap: 10px;
}
.back-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 0 16px; min-height: 56px;
  border-radius: 12px; font-size: 15px; font-weight: 700;
  background: #f0f2f5; color: #555;
  text-decoration: none; white-space: nowrap; border: 1px solid #d0d5e8;
}
.save-btn {
  flex: 1; min-height: 56px;
  border: none; border-radius: 12px;
  font-size: 18px; font-weight: 900;
  cursor: pointer; white-space: nowrap;
  transition: all 0.15s;
}
.save-btn:not(:disabled) { background: #2563eb; color: #fff; }
.save-btn:disabled       { background: #e5e7eb; color: #9ca3af; cursor: default; }

/* в”Җв”Җ л°”н…Җ мӢңнҠё лӘЁлӢ¬ в”Җв”Җ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.45);
  display: flex; align-items: flex-end;
  z-index: 100;
}
.modal-sheet {
  background: #fff;
  border-radius: 22px 22px 0 0;
  width: 100%;
  padding: 24px 20px 32px;
  padding-bottom: calc(32px + env(safe-area-inset-bottom, 0px));
}
.modal-room {
  text-align: center;
  font-size: 38px; font-weight: 900; color: #1a1a2e;
  white-space: nowrap;
}
.modal-sub {
  text-align: center;
  font-size: 15px; color: #888; margin-top: 6px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.modal-btns { display: flex; gap: 12px; margin-top: 20px; }
.modal-btn {
  flex: 1; min-height: 64px;
  border-radius: 14px; border: 2.5px solid;
  font-size: 20px; font-weight: 900;
  cursor: pointer; background: transparent;
  white-space: nowrap;
}
.modal-btn:active { transform: scale(0.96); }
.modal-btn-yes { border-color: #fca5a5; color: #dc2626; background: #fef2f2; }
.modal-btn-no  { border-color: #86efac; color: #166534; background: #f0fdf4; }
.modal-cancel {
  width: 100%; min-height: 52px; margin-top: 10px;
  border-radius: 12px; border: 1px solid #e0e4ed;
  background: #f9fafb; color: #888; font-size: 16px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
}

/* в”Җв”Җ нҶ мҠӨнҠё в”Җв”Җ */
.toast {
  position: fixed; bottom: 90px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: #1a1a2e; color: #fff;
  padding: 12px 24px; border-radius: 20px;
  font-size: 15px; z-index: 200;
  transition: transform 0.25s;
  white-space: nowrap; pointer-events: none;
}
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row1">
    <div class="h-title">рҹ§і м§җ мІҙнҒ¬</div>
    <button class="refresh-btn" onclick="loadData()">вҶ»</button>
  </div>
  <div class="header-row2">
    <div class="h-date" id="headerDate"></div>
    <div class="h-rms"  id="updatedAt">л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...</div>
  </div>
</div>

<div class="summary-bar">
  <div class="s-chip"><div class="s-num c-occupied" id="cntOccupied">-</div><div class="s-label">мһ…мӢӨмӨ‘</div></div>
  <div class="s-chip"><div class="s-num c-todo"     id="cntTodo">-</div><div class="s-label">нҷ•мқён•„мҡ”</div></div>
  <div class="s-chip"><div class="s-num c-yes"      id="cntYes">-</div><div class="s-label">м§җмһҲмқҢ</div></div>
  <div class="s-chip"><div class="s-num c-no"       id="cntNo">-</div><div class="s-label">м§җм—ҶмқҢ</div></div>
</div>

<div class="scroll-area">
  <div id="floorContainer"></div>
</div>

<div class="save-bar">
  <a class="back-btn" href="index.html">вҶҗ нҳ„нҷ©</a>
  <button class="save-btn" id="saveBtn" onclick="saveResults()" disabled>мІҙнҒ¬ нӣ„ м ҖмһҘ</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

const FIXED_FLOORS = {
  2: ['201','202','203','204','205','206','207','208','209','210','211','212','213'],
  3: ['301','302','303','304','305','306','307','308','309','310'],
  5: ['501','502','503','504','505','506','507','508','509','510']
};

let allRooms   = [];
let luggageChecked = {}; // room вҶ’ 'yes' | 'no'
let refreshTimer   = null;

/* в”Җв”Җ м„ём…ҳ мғҒнғң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function initState() {
  const today = new Date().toLocaleDateString('ko-KR');
  if (sessionStorage.getItem('lugDate') === today) {
    luggageChecked = JSON.parse(sessionStorage.getItem('lugChecked') || '{}');
  } else {
    luggageChecked = {};
    sessionStorage.setItem('lugDate', today);
  }
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

function saveState() {
  sessionStorage.setItem('lugDate', new Date().toLocaleDateString('ko-KR'));
  sessionStorage.setItem('lugChecked', JSON.stringify(luggageChecked));
}

/* в”Җв”Җ JSONP в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

/* в”Җв”Җ лҚ°мқҙн„° лЎңл“ң в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
async function loadData() {
  document.getElementById('updatedAt').textContent = 'л¶Ҳлҹ¬мҳӨлҠ” мӨ‘...';
  let data = null;
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      data = await fetchJsonp(API + '?action=data');
      break;
    } catch(e) {
      if (attempt === 2) {
        document.getElementById('updatedAt').textContent = 'мҳӨлҘҳ: ' + e.message;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadData, 60000);
        return;
      }
      document.getElementById('updatedAt').textContent = 'мһ¬мӢңлҸ„ мӨ‘...';
    }
  }
  allRooms = data.rooms || [];
  const t = (data.updatedAt || '').replace(/^.*?(\d+мӣ”\d+мқј).*?(\d+мӢң\d+л¶„).*$/, '$1 $2');
  document.getElementById('updatedAt').textContent = 'RMS: ' + (t || (data.updatedAt||'').substring(5,16));
  render();
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

/* в”Җв”Җ к°қмӢӨ мғҒнғң нҢҗлі„ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
// л°ҳнҷҳк°’: 'occupied' | 'todo' | 'empty'
function getRoomLiveState(roomNum) {
  const r = allRooms.find(function(x) { return x.room === roomNum; });
  if (!r) return 'empty';
  if (r.type === 'normal' && r.occupied) return 'occupied';  // мһ…мӢӨмӨ‘
  if (r.type === 'empty' || (r.type === 'normal' && !r.occupied)) return 'todo'; // нҮҙмӢӨ/мҷём¶ң
  return 'empty';
}

/* м •л ¬ мҡ°м„ мҲңмң„: мһ…мӢӨмӨ‘(0) вҶ’ нҷ•мқён•„мҡ”(1) вҶ’ мІҙнҒ¬мҷ„лЈҢ(2) вҶ’ кіөмӢӨ(3) */
function sortPriority(roomNum) {
  const chk  = luggageChecked[roomNum];
  const live = getRoomLiveState(roomNum);
  if (live === 'occupied') return 0;
  if (live === 'todo' && !chk) return 1;
  if (chk) return 2;
  return 3;
}

/* в”Җв”Җ л ҢлҚ” в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function render() {
  let cntOccupied = 0, cntTodo = 0, cntYes = 0, cntNo = 0;

  const html = Object.entries(FIXED_FLOORS).map(function(entry) {
    const floor = entry[0];
    const rooms = entry[1];

    const sorted = rooms.slice().sort(function(a, b) {
      const pa = sortPriority(a), pb = sortPriority(b);
      if (pa !== pb) return pa - pb;
      return a.localeCompare(b);
    });

    const cards = sorted.map(function(roomNum) {
      const live = getRoomLiveState(roomNum);
      const chk  = luggageChecked[roomNum];

      /* мһ…мӢӨмӨ‘ вҖ” н„°м№ҳ л¶Ҳк°Җ */
      if (live === 'occupied') {
        cntOccupied++;
        return `<div class="lug-card card-occupied">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">рҹ”ҙ мһ…мӢӨмӨ‘</div>
        </div>`;
      }

      /* м§җмһҲмқҢ вҖ” нғӯмңјлЎң м·ЁмҶҢ */
      if (chk === 'yes') {
        cntYes++;
        return `<div class="lug-card card-yes tappable" onclick="mark('${roomNum}',null)">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">вң… м§җмһҲмқҢ</div>
          <div class="lug-hint">нғӯ вҶ’ м·ЁмҶҢ</div>
        </div>`;
      }

      /* м§җм—ҶмқҢ вҖ” нғӯмңјлЎң м·ЁмҶҢ */
      if (chk === 'no') {
        cntNo++;
        return `<div class="lug-card card-no tappable" onclick="mark('${roomNum}',null)">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">вң” м§җм—ҶмқҢ</div>
          <div class="lug-hint">нғӯ вҶ’ м·ЁмҶҢ</div>
        </div>`;
      }

      /* нҷ•мқён•„мҡ” вҖ” н„°м№ҳ к°ҖлҠҘ */
      if (live === 'todo') {
        cntTodo++;
        return `<div class="lug-card card-todo tappable" onclick="openModal('${roomNum}')">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">вқ—нҷ•мқён•„мҡ”</div>
        </div>`;
      }

      /* кіөмӢӨ */
      return `<div class="lug-card card-empty">
        <div class="lug-room">${roomNum}</div>
        <div class="lug-status">кіөмӢӨ</div>
      </div>`;
    }).join('');

    return `<div class="floor-section">
      <div class="floor-label">${floor}мёө</div>
      <div class="card-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('floorContainer').innerHTML = html;

  document.getElementById('cntOccupied').textContent = cntOccupied;
  document.getElementById('cntTodo').textContent      = cntTodo;
  document.getElementById('cntYes').textContent       = cntYes;
  document.getElementById('cntNo').textContent        = cntNo;

  updateSaveBtn(cntYes + cntNo);
}

/* в”Җв”Җ мІҙнҒ¬ лӘЁлӢ¬ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function openModal(roomNum) {
  const existing = document.getElementById('lugModal');
  if (existing) existing.remove();

  const overlay = document.createElement('div');
  overlay.id = 'lugModal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-sheet">
      <div class="modal-room">${roomNum}нҳё</div>
      <div class="modal-sub">м§җ мІҙнҒ¬ кІ°кіјлҘј м„ нғқн•ҳм„ёмҡ”</div>
      <div class="modal-btns">
        <button class="modal-btn modal-btn-yes" onclick="mark('${roomNum}','yes')">вң… м§җ мһҲмқҢ</button>
        <button class="modal-btn modal-btn-no"  onclick="mark('${roomNum}','no')">вң” м—Ҷ мқҢ</button>
      </div>
      <button class="modal-cancel" onclick="closeModal()">м·ЁмҶҢ</button>
    </div>
  `;
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.body.appendChild(overlay);
}

function closeModal() {
  const m = document.getElementById('lugModal');
  if (m) m.remove();
}

/* в”Җв”Җ мІҙнҒ¬ кё°лЎқ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function mark(roomNum, val) {
  closeModal();
  if (val === null) {
    delete luggageChecked[roomNum];
  } else {
    luggageChecked[roomNum] = val;
  }
  saveState();
  render();
}

/* в”Җв”Җ м ҖмһҘ лІ„нҠј в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function updateSaveBtn(count) {
  const btn = document.getElementById('saveBtn');
  if (count > 0) {
    btn.disabled = false;
    btn.textContent = 'вң“ ' + count + 'кұҙ м ҖмһҘн•ҳкё°';
  } else {
    btn.disabled = true;
    btn.textContent = 'мІҙнҒ¬ нӣ„ м ҖмһҘ';
  }
}

async function saveResults() {
  const entries = Object.entries(luggageChecked);
  if (!entries.length) { showToast('мІҙнҒ¬лҗң н•ӯлӘ©мқҙ м—ҶмҠөлӢҲлӢӨ'); return; }
  const date    = new Date().toLocaleDateString('ko-KR');
  const results = entries.map(function(e) { return e[0] + '=' + e[1]; }).join(',');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = 'м ҖмһҘ мӨ‘...';
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=luggage_check&date=' + encodeURIComponent(date) + '&results=' + encodeURIComponent(results)
    });
    showToast('вң“ м ҖмһҘ мҷ„лЈҢ!');
    btn.textContent = 'вң“ м ҖмһҘлҗЁ';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'лӢӨмӢң м ҖмһҘн•ҳкё°';
    showToast('м ҖмһҘ мҳӨлҘҳ вҖ” мһ мӢң нӣ„ лӢӨмӢң мӢңлҸ„н•ҙмЈјм„ёмҡ”');
  }
}

/* в”Җв”Җ нҶ мҠӨнҠё в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

loadData();
