<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>짐 체크</title>
<style>
:root {
  --bg: #0f1117; --surface: #1a1d27; --surface2: #222536;
  --border: #2d3148; --text: #e8eaf0; --text-sub: #7b80a0; --accent: #6c7aff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; color: var(--text); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.header-left .title { font-size: 20px; font-weight: 900; }
.header-left .date  { font-size: 13px; color: var(--text-sub); margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated-at { font-size: 12px; color: var(--text-sub); }
.refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 8px 14px; font-size: 16px; cursor: pointer; }

/* ── 알림 바 ── */
.notif-bar { flex-shrink: 0; display: flex; align-items: center; gap: 10px; padding: 10px 16px; background: #12151f; border-bottom: 1px solid var(--border); font-size: 13px; color: var(--text-sub); cursor: pointer; }
.notif-dot { width: 10px; height: 10px; border-radius: 50%; background: #3a3f60; flex-shrink: 0; }
.notif-dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }

/* ── 요약 바 ── */
.summary-bar { flex-shrink: 0; display: flex; border-bottom: 2px solid var(--border); }
.summary-chip { flex: 1; text-align: center; padding: 12px 4px; border-right: 1px solid var(--border); }
.summary-chip:last-child { border-right: none; }
.summary-num   { font-size: 28px; font-weight: 900; line-height: 1; }
.summary-label { font-size: 12px; color: var(--text-sub); margin-top: 4px; font-weight: 600; }
.num-wait  { color: #fb923c; }
.num-ready { color: #4ade80; }
.num-done  { color: #2dd4bf; }
.num-empty { color: #94a3b8; }

/* ── 스크롤 ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 120px; }

/* ── 섹션 라벨 ── */
.section-label { padding: 14px 16px 8px; font-size: 14px; font-weight: 800; letter-spacing: 0.04em; display: flex; align-items: center; gap: 8px; }

/* ── 카드 그리드 (2열) ── */
.card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 4px 12px 8px; }

/* ── 카드 ── */
.lug-card { border-radius: 16px; border: 2px solid; padding: 14px 12px 12px; display: flex; flex-direction: column; gap: 8px; }
.lug-card.waiting     { background: #201000; border-color: #7c3a00; }
.lug-card.ready       { background: #001408; border-color: #1a5c35; }
.lug-card.checked-yes { background: #002d28; border-color: #0d9488; }
.lug-card.checked-no  { background: #181d30; border-color: #3b4270; }

/* 방번호 */
.lug-room { font-size: 38px; font-weight: 900; line-height: 1; }
.lug-card.waiting     .lug-room { color: #fb923c; }
.lug-card.ready       .lug-room { color: #4ade80; }
.lug-card.checked-yes .lug-room { color: #2dd4bf; }
.lug-card.checked-no  .lug-room { color: #8892c4; }

/* 상태 텍스트 */
.lug-status { font-size: 13px; font-weight: 700; }
.lug-card.waiting     .lug-status { color: #fb923c; }
.lug-card.ready       .lug-status { color: #4ade80; }
.lug-card.checked-yes .lug-status { color: #2dd4bf; }
.lug-card.checked-no  .lug-status { color: #7b80a0; }

/* 선택 완료 배지 */
.lug-done-badge { font-size: 18px; font-weight: 900; padding: 8px 0; text-align: center; border-radius: 10px; }
.lug-card.checked-yes .lug-done-badge { background: #0d3d38; color: #2dd4bf; }
.lug-card.checked-no  .lug-done-badge { background: #1e2340; color: #8892c4; }

/* 버튼 그룹 */
.lug-btns { display: flex; flex-direction: column; gap: 8px; }
.lug-btn { width: 100%; padding: 14px 0; border-radius: 10px; border: 2px solid; font-size: 17px; font-weight: 800; cursor: pointer; background: transparent; transition: all 0.1s; letter-spacing: 0.02em; }
.lug-btn:active { transform: scale(0.96); }

.lug-btn.yes         { border-color: #166534; color: #4ade80; }
.lug-btn.yes.active  { background: #052e16; border-color: #22c55e; color: #fff; }
.lug-btn.no          { border-color: #2d3148; color: #7b80a0; }
.lug-btn.no.active   { background: #1e2340; border-color: #4b5180; color: #e8eaf0; }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 48px 20px; color: var(--text-sub); font-size: 15px; line-height: 2; grid-column: 1/-1; }

/* ── 저장 바 ── */
.save-bar {
  flex-shrink: 0;
  padding: 12px 14px;
  background: var(--surface);
  border-top: 2px solid var(--border);
  display: flex;
  gap: 10px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
}
.back-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 0 18px; height: 60px;
  border-radius: 14px; font-size: 16px; font-weight: 700;
  background: var(--surface2); color: var(--text-sub);
  text-decoration: none; white-space: nowrap; border: 1px solid var(--border);
}
.save-btn {
  flex: 1; height: 60px;
  border: none; border-radius: 14px;
  font-size: 18px; font-weight: 900;
  cursor: pointer; letter-spacing: 0.03em;
  transition: all 0.15s;
}
.save-btn:not(:disabled) { background: var(--accent); color: #fff; }
.save-btn:disabled       { background: var(--surface2); color: #3a3f60; border: 1px solid var(--border); cursor: default; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 14px 28px; border-radius: 24px; font-size: 16px; z-index: 200; transition: transform 0.25s; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title">🧳 짐 체크</div>
    <div class="date" id="headerDate"></div>
  </div>
  <div class="header-right">
    <div class="updated-at" id="updatedAt">불러오는 중...</div>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>
</div>

<div class="notif-bar" id="notifBar" onclick="toggleNotification()">
  <div class="notif-dot" id="notifDot"></div>
  <span id="notifLabel">탭하여 퇴실 알림 허용</span>
</div>

<div class="summary-bar">
  <div class="summary-chip">
    <div class="summary-num num-wait" id="cntWait">-</div>
    <div class="summary-label">재실중</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-ready" id="cntReady">-</div>
    <div class="summary-label">체크가능</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-done" id="cntDone">-</div>
    <div class="summary-label">짐있음</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-empty" id="cntEmpty">-</div>
    <div class="summary-label">없음</div>
  </div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="section-label" id="waitLabel" style="display:none">🔴 재실중 (방에 있음)</div>
  <div class="card-grid" id="waitGrid"></div>
  <div class="section-label" id="readyLabel" style="display:none">🟢 체크 가능 (외출중 · 퇴실완료)</div>
  <div class="card-grid" id="readyGrid"></div>
</div>

<div class="save-bar">
  <a class="back-btn" href="index.html">← 현황</a>
  <button class="save-btn" id="saveBtn" onclick="saveResults()" disabled>체크 후 저장</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

let allRooms = [];
let refreshTimer = null;

let luggageTargets = new Set();
let luggageWaiting = new Set();
let luggageChecked = {};

function initState() {
  const today = new Date().toLocaleDateString('ko-KR');
  if (sessionStorage.getItem('lugDate') === today) {
    luggageTargets = new Set(JSON.parse(sessionStorage.getItem('lugTargets') || '[]'));
    luggageWaiting = new Set(JSON.parse(sessionStorage.getItem('lugWaiting') || '[]'));
    luggageChecked = JSON.parse(sessionStorage.getItem('lugChecked') || '{}');
  } else {
    luggageTargets = new Set();
    luggageWaiting = new Set();
    luggageChecked = {};
    sessionStorage.setItem('lugDate', today);
  }
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'short' });
}

function saveState() {
  const today = new Date().toLocaleDateString('ko-KR');
  sessionStorage.setItem('lugDate', today);
  sessionStorage.setItem('lugTargets', JSON.stringify([...luggageTargets]));
  sessionStorage.setItem('lugWaiting', JSON.stringify([...luggageWaiting]));
  sessionStorage.setItem('lugChecked', JSON.stringify(luggageChecked));
}

// ── JSONP ─────────────────────────────────────
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() { clearTimeout(timer); delete window[cb]; if (script.parentNode) script.parentNode.removeChild(script); }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 데이터 로드 ───────────────────────────────
async function loadData() {
  document.getElementById('updatedAt').textContent = '불러오는 중...';
  let data = null;
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      data = await fetchJsonp(API + '?action=data');
      break;
    } catch (e) {
      if (attempt === 2) {
        document.getElementById('updatedAt').textContent = '오류: ' + e.message;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadData, 60000);
        return;
      }
      document.getElementById('updatedAt').textContent = '재시도 중...';
    }
  }
  allRooms = data.rooms || [];
  const t = (data.updatedAt || '').replace(/^.*?(\d+월\d+일).*?(\d+시\d+분).*$/, '$1 $2');
  document.getElementById('updatedAt').textContent = 'RMS: ' + (t || (data.updatedAt||'').substring(5,16));
  trackAndRender();
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

// ── 추적 ──────────────────────────────────────
function trackAndRender() {
  allRooms.filter(r => r.checkinLabel === '어제입실').forEach(r => {
    luggageTargets.add(r.room);
  });

  // 손님이 방 안에 있는(USING=occupied) 방만 재실중
  const nowWaiting = new Set(
    allRooms.filter(r => r.type === 'normal' && r.occupied && luggageTargets.has(r.room)).map(r => r.room)
  );

  // 재실 → 외출/퇴실 전환 시 알림
  luggageWaiting.forEach(room => {
    if (!nowWaiting.has(room)) fireAlert(room);
  });

  luggageWaiting = nowWaiting;
  saveState();
  render();
}

function fireAlert(room) {
  playBeep();
  if (Notification.permission === 'granted') {
    new Notification('🛎 짐체크 필요', { body: room + '호 외출/퇴실 — 짐 확인해주세요', requireInteraction: true });
  }
  showToast('🔔 ' + room + '호 — 짐체크 필요!');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 220, 440].forEach(function(delay) {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = 880; osc.type = 'sine';
      const t = ctx.currentTime + delay / 1000;
      gain.gain.setValueAtTime(0.4, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t); osc.stop(t + 0.4);
    });
  } catch(e) {}
}

// ── 렌더 ──────────────────────────────────────
function render() {
  const targets = [...luggageTargets];

  // 재실중: 키 있는(occupied) 일반 객실
  const waiting = allRooms.filter(r => targets.includes(r.room) && r.type === 'normal' && r.occupied)
    .sort((a,b) => a.room.localeCompare(b.room));
  // 체크가능: 퇴실(empty) 또는 외출중(!occupied, normal)
  const ready = allRooms.filter(r => targets.includes(r.room) && (r.type === 'empty' || (r.type === 'normal' && !r.occupied)))
    .sort((a,b) => a.room.localeCompare(b.room));

  const doneYes = Object.values(luggageChecked).filter(v => v === 'yes').length;
  const doneNo  = Object.values(luggageChecked).filter(v => v === 'no').length;

  document.getElementById('cntWait').textContent  = waiting.length;
  document.getElementById('cntReady').textContent = ready.filter(r => !luggageChecked[r.room]).length;
  document.getElementById('cntDone').textContent  = doneYes;
  document.getElementById('cntEmpty').textContent = doneNo;

  const waitLabel  = document.getElementById('waitLabel');
  const readyLabel = document.getElementById('readyLabel');
  const waitGrid   = document.getElementById('waitGrid');
  const readyGrid  = document.getElementById('readyGrid');

  if (targets.length === 0) {
    waitLabel.style.display = readyLabel.style.display = 'none';
    waitGrid.innerHTML = '';
    readyGrid.innerHTML = `<div class="empty-state">
      어제 입실 객실이 없습니다<br>
      <span style="font-size:13px;color:#4b5180">데이터 갱신 후 자동 표시됩니다</span>
    </div>`;
    updateSaveBtn(0);
    return;
  }

  waitLabel.style.display  = waiting.length ? '' : 'none';
  readyLabel.style.display = ready.length   ? '' : 'none';

  // 재실중 카드 (버튼 없음)
  waitGrid.innerHTML = waiting.map(r => `
    <div class="lug-card waiting">
      <div class="lug-room">${r.room}</div>
      <div class="lug-status">🔴 재실중</div>
    </div>
  `).join('');

  // 체크가능 카드
  readyGrid.innerHTML = ready.map(function(r) {
    const chk = luggageChecked[r.room];
    const statusLabel = r.type === 'empty' ? '🟢 퇴실완료' : '🟡 외출중';

    if (chk) {
      // 이미 체크됨 → 배지 + 다시탭해제 버튼
      const badgeText = chk === 'yes' ? '✅ 짐 있음' : '☑️ 없음 확인';
      const cls = chk === 'yes' ? 'checked-yes' : 'checked-no';
      return `<div class="lug-card ${cls}">
        <div class="lug-room">${r.room}</div>
        <div class="lug-status">${statusLabel}</div>
        <div class="lug-done-badge">${badgeText}</div>
        <button class="lug-btn no" style="font-size:14px;padding:10px 0" onclick="mark('${r.room}',null)">↩ 취소</button>
      </div>`;
    } else {
      return `<div class="lug-card ready">
        <div class="lug-room">${r.room}</div>
        <div class="lug-status">${statusLabel}</div>
        <div class="lug-btns">
          <button class="lug-btn yes" onclick="mark('${r.room}','yes')">✅ 짐 있음</button>
          <button class="lug-btn no"  onclick="mark('${r.room}','no')">❌ 없 음</button>
        </div>
      </div>`;
    }
  }).join('');

  updateSaveBtn(doneYes + doneNo);
  renderNotifBar();
}

function mark(room, val) {
  if (val === null) {
    delete luggageChecked[room];
  } else {
    luggageChecked[room] = val;
  }
  saveState();
  render();
}

function updateSaveBtn(count) {
  const btn = document.getElementById('saveBtn');
  if (count > 0) {
    btn.disabled = false;
    btn.textContent = '✓ ' + count + '건 저장하기';
  } else {
    btn.disabled = true;
    btn.textContent = '체크 후 저장';
  }
}

// ── 알림 ──────────────────────────────────────
async function toggleNotification() {
  const perm = Notification.permission;
  if (perm === 'granted') {
    showToast('알림이 이미 허용되어 있습니다 ✓');
  } else if (perm === 'denied') {
    showToast('브라우저 설정에서 알림을 허용해주세요');
  } else {
    await Notification.requestPermission();
    renderNotifBar();
    if (Notification.permission === 'granted') showToast('알림 허용됨 ✓');
  }
}

function renderNotifBar() {
  const dot = document.getElementById('notifDot');
  const label = document.getElementById('notifLabel');
  const perm = Notification.permission;
  if (perm === 'granted') {
    dot.className = 'notif-dot on';
    label.textContent = '알림 허용됨 — 외출/퇴실 감지 시 자동 알림';
  } else if (perm === 'denied') {
    dot.className = 'notif-dot';
    label.textContent = '알림 차단됨 — 브라우저 설정에서 허용 필요';
  } else {
    dot.className = 'notif-dot';
    label.textContent = '탭하여 퇴실 알림 허용';
  }
}

// ── 저장 ──────────────────────────────────────
async function saveResults() {
  const entries = Object.entries(luggageChecked);
  if (!entries.length) { showToast('체크된 항목이 없습니다'); return; }
  const date    = new Date().toLocaleDateString('ko-KR');
  const results = entries.map(function(e) { return e[0] + '=' + e[1]; }).join(',');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '저장 중...';
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=luggage_check&date=' + encodeURIComponent(date) + '&results=' + encodeURIComponent(results)
    });
    showToast('✓ 저장 완료!');
    btn.textContent = '✓ 저장됨';
  } catch(e) {
    btn.disabled = false;
    btn.textContent = '다시 저장하기';
    showToast('저장 오류 — 잠시 후 다시 시도해주세요');
  }
}

// ── 토스트 ────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ── 초기화 ────────────────────────────────────
initState();
renderNotifBar();
loadData();
</script>
</body>
</html>
