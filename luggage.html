<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>짐 체크</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: #f0f2f5; font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; color: #1a1a2e; overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header {
  flex-shrink: 0; background: #fff; border-bottom: 1px solid #e0e4ed;
  padding: 12px 16px 10px;
}
.header-row1 { display: flex; justify-content: space-between; align-items: center; }
.h-title { font-size: 22px; font-weight: 900; color: #1a1a2e; white-space: nowrap; }
.refresh-btn {
  background: #f0f2f5; border: 1px solid #d0d5e8; color: #444;
  border-radius: 10px; padding: 8px 14px; font-size: 20px; cursor: pointer; flex-shrink: 0;
}
.header-row2 { margin-top: 6px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.h-date { font-size: 15px; font-weight: 700; color: #333; white-space: nowrap; }
.h-rms  { font-size: 12px; color: #888; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── 요약 바 ── */
.summary-bar {
  flex-shrink: 0; display: grid; grid-template-columns: repeat(4, 1fr);
  background: #fff; border-bottom: 2px solid #e0e4ed;
}
.s-chip { text-align: center; padding: 10px 4px; border-right: 1px solid #e0e4ed; }
.s-chip:last-child { border-right: none; }
.s-num   { font-size: 26px; font-weight: 900; line-height: 1; }
.s-label { font-size: 11px; color: #888; margin-top: 3px; white-space: nowrap; }
.c-occupied { color: #dc2626; }
.c-todo     { color: #d97706; }
.c-yes      { color: #7c3aed; }
.c-long     { color: #64748b; }

/* ── 스크롤 영역 ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding-bottom: 100px; }

/* ── 층 섹션 ── */
.floor-section { padding: 0 12px 16px; }
.floor-label { font-size: 16px; font-weight: 900; color: #555; padding: 14px 4px 8px; white-space: nowrap; }

/* ── 카드 그리드 (3열) ── */
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }

/* ── 카드 공통 ── */
.lug-card {
  border-radius: 14px; border: 2.5px solid;
  padding: 12px 6px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 5px;
  min-height: 80px; transition: transform 0.1s;
}
.lug-card.tappable { cursor: pointer; }
.lug-card.tappable:active { transform: scale(0.93); }

.lug-room   { font-size: 28px; font-weight: 900; line-height: 1; white-space: nowrap; }
.lug-status { font-size: 12px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

/* 입실중 */
.card-occupied { background: #fef2f2; border-color: #fca5a5; }
.card-occupied .lug-room   { color: #dc2626; }
.card-occupied .lug-status { color: #ef4444; }

/* 장기 */
.card-long { background: #f8fafc; border-color: #cbd5e1; }
.card-long .lug-room   { color: #64748b; }
.card-long .lug-status { color: #94a3b8; }

/* 확인필요 */
.card-todo { background: #fffbeb; border-color: #fcd34d; }
.card-todo .lug-room   { color: #92400e; }
.card-todo .lug-status { color: #d97706; }

/* 짐있음 */
.card-yes { background: #f5f3ff; border-color: #a78bfa; }
.card-yes .lug-room   { color: #6d28d9; }
.card-yes .lug-status { color: #7c3aed; }

/* 공실 */
.card-empty { background: #f9fafb; border-color: #e5e7eb; opacity: 0.55; }
.card-empty .lug-room   { color: #9ca3af; }
.card-empty .lug-status { color: #9ca3af; }

/* ── 저장 바 ── */
.save-bar {
  flex-shrink: 0;
  padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 20px));
  background: #fff; border-top: 2px solid #e0e4ed; display: flex; gap: 10px;
}
.back-btn {
  display: flex; align-items: center; justify-content: center;
  padding: 0 16px; min-height: 56px;
  border-radius: 12px; font-size: 15px; font-weight: 700;
  background: #f0f2f5; color: #555;
  text-decoration: none; white-space: nowrap; border: 1px solid #d0d5e8;
}
.save-btn {
  flex: 1; min-height: 56px; border: none; border-radius: 12px;
  font-size: 18px; font-weight: 900; cursor: pointer; white-space: nowrap; transition: all 0.15s;
}
.save-btn:not(:disabled) { background: #2563eb; color: #fff; }
.save-btn:disabled       { background: #e5e7eb; color: #9ca3af; cursor: default; }

/* ── 저장 확인 모달 ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.45);
  display: flex; align-items: center; justify-content: center;
  padding: 24px; z-index: 100;
}
.modal-box {
  background: #fff; border-radius: 20px; width: 100%; max-width: 320px;
  padding: 28px 24px 20px; text-align: center;
}
.modal-title { font-size: 18px; font-weight: 900; color: #1a1a2e; margin-bottom: 20px; white-space: nowrap; }
.modal-stats {
  display: flex; gap: 8px; justify-content: center; margin-bottom: 24px;
}
.stat-box {
  flex: 1; background: #f8fafc; border-radius: 12px; padding: 14px 8px;
}
.stat-num   { font-size: 28px; font-weight: 900; line-height: 1; }
.stat-label { font-size: 12px; color: #888; margin-top: 4px; white-space: nowrap; }
.stat-box.yes .stat-num { color: #7c3aed; }
.stat-box.total .stat-num { color: #1a1a2e; }
.stat-box.empty .stat-num { color: #16a34a; }
.modal-btns { display: flex; gap: 10px; }
.modal-cancel { flex: 1; min-height: 52px; border-radius: 12px; border: 1px solid #e0e4ed; background: #f9fafb; color: #555; font-size: 16px; font-weight: 700; cursor: pointer; white-space: nowrap; }
.modal-save   { flex: 2; min-height: 52px; border-radius: 12px; border: none; background: #2563eb; color: #fff; font-size: 16px; font-weight: 900; cursor: pointer; white-space: nowrap; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(80px); background: #1a1a2e; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 15px; z-index: 200; transition: transform 0.25s; white-space: nowrap; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row1">
    <div class="h-title">🧳 짐 체크</div>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>
  <div class="header-row2">
    <div class="h-date" id="headerDate"></div>
    <div class="h-rms"  id="updatedAt">불러오는 중...</div>
  </div>
</div>

<div class="summary-bar">
  <div class="s-chip"><div class="s-num c-occupied" id="cntOccupied">-</div><div class="s-label">입실중</div></div>
  <div class="s-chip"><div class="s-num c-todo"     id="cntTodo">-</div><div class="s-label">확인필요</div></div>
  <div class="s-chip"><div class="s-num c-yes"      id="cntYes">-</div><div class="s-label">짐있음</div></div>
  <div class="s-chip"><div class="s-num c-long"     id="cntLong">-</div><div class="s-label">장기</div></div>
</div>

<div class="scroll-area">
  <div id="floorContainer"></div>
</div>

<div class="save-bar">
  <a class="back-btn" href="index.html">← 현황</a>
  <button class="save-btn" id="saveBtn" onclick="confirmSave()" disabled>체크 후 저장</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

const FIXED_FLOORS = {
  2: ['201','202','203','204','205','206','207','208','209','210','211','212','213'],
  3: ['301','302','303','304','305','306','307','308','309','310'],
  5: ['501','502','503','504','505','506','507','508','509','510']
};

let allRooms = [];
let luggageYes = {};  // room → true (짐있음만 추적)
let refreshTimer = null;

/* ── 세션 상태 ─────────────────────────────── */
function initState() {
  const today = new Date().toLocaleDateString('ko-KR');
  if (sessionStorage.getItem('lugDate') === today) {
    luggageYes = JSON.parse(sessionStorage.getItem('lugYes') || '{}');
  } else {
    luggageYes = {};
    sessionStorage.setItem('lugDate', today);
  }
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
}

function saveState() {
  sessionStorage.setItem('lugDate', new Date().toLocaleDateString('ko-KR'));
  sessionStorage.setItem('lugYes', JSON.stringify(luggageYes));
}

/* ── JSONP ─────────────────────────────────── */
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(function() { cleanup(); reject(new Error('timeout')); }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer); delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

/* ── 데이터 로드 ────────────────────────────── */
async function loadData() {
  document.getElementById('updatedAt').textContent = '불러오는 중...';
  let data = null;
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      data = await fetchJsonp(API + '?action=data');
      break;
    } catch(e) {
      if (attempt === 2) {
        document.getElementById('updatedAt').textContent = '오류: ' + e.message;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadData, 60000);
        return;
      }
      document.getElementById('updatedAt').textContent = '재시도 중...';
    }
  }
  allRooms = data.rooms || [];
  const t = (data.updatedAt || '').replace(/^.*?(\d+월\d+일).*?(\d+시\d+분).*$/, '$1 $2');
  document.getElementById('updatedAt').textContent = 'RMS: ' + (t || (data.updatedAt||'').substring(5,16));
  render();
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

/* ── 객실 상태 판별 ─────────────────────────── */
// 'occupied' | 'long' | 'todo' | 'empty'
function getRoomLiveState(roomNum) {
  const r = allRooms.find(function(x) { return x.room === roomNum; });
  if (!r) return 'empty';

  // 장기객실 (stayType에 J 포함)
  if (r.type === 'long') return 'long';

  // 입실중 (방 안에 있음)
  if (r.type === 'normal' && r.occupied) return 'occupied';

  // 확인필요: 일반투숙 외출중(OUT) 또는 퇴실(EMPTY)인데 입실 이력 있음
  if (r.type === 'normal' && !r.occupied) return 'todo';

  // 공실 (EMPTY + 입실이력 없음)
  return 'empty';
}

/* 정렬 우선순위: 입실중(0) → 장기(1) → 확인필요(2) → 짐있음(3) → 공실(4) */
function sortPriority(roomNum) {
  const live = getRoomLiveState(roomNum);
  if (live === 'occupied') return 0;
  if (live === 'long')     return 1;
  if (live === 'todo' && !luggageYes[roomNum]) return 2;
  if (luggageYes[roomNum]) return 3;
  return 4;
}

/* ── 렌더 ───────────────────────────────────── */
function render() {
  let cntOccupied = 0, cntTodo = 0, cntYes = 0, cntLong = 0;

  const html = Object.entries(FIXED_FLOORS).map(function(entry) {
    const floor = entry[0];
    const rooms = entry[1];

    const sorted = rooms.slice().sort(function(a, b) {
      const pa = sortPriority(a), pb = sortPriority(b);
      if (pa !== pb) return pa - pb;
      return a.localeCompare(b);
    });

    const cards = sorted.map(function(roomNum) {
      const live = getRoomLiveState(roomNum);
      const isYes = luggageYes[roomNum];

      /* 입실중 */
      if (live === 'occupied') {
        cntOccupied++;
        return `<div class="lug-card card-occupied">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">🔴 입실중</div>
        </div>`;
      }

      /* 장기 */
      if (live === 'long') {
        cntLong++;
        return `<div class="lug-card card-long">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">📋 장기</div>
        </div>`;
      }

      /* 짐있음 (터치 → 취소) */
      if (isYes) {
        cntYes++;
        return `<div class="lug-card card-yes tappable" onclick="toggle('${roomNum}')">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">✅ 짐있음</div>
        </div>`;
      }

      /* 확인필요 (터치 → 짐있음) */
      if (live === 'todo') {
        cntTodo++;
        return `<div class="lug-card card-todo tappable" onclick="toggle('${roomNum}')">
          <div class="lug-room">${roomNum}</div>
          <div class="lug-status">❗확인필요</div>
        </div>`;
      }

      /* 공실 */
      return `<div class="lug-card card-empty">
        <div class="lug-room">${roomNum}</div>
        <div class="lug-status">공실</div>
      </div>`;
    }).join('');

    return `<div class="floor-section">
      <div class="floor-label">${floor}층</div>
      <div class="card-grid">${cards}</div>
    </div>`;
  }).join('');

  document.getElementById('floorContainer').innerHTML = html;

  document.getElementById('cntOccupied').textContent = cntOccupied;
  document.getElementById('cntTodo').textContent      = cntTodo;
  document.getElementById('cntYes').textContent       = cntYes;
  document.getElementById('cntLong').textContent      = cntLong;

  updateSaveBtn(cntYes);
}

/* ── 직접 토글 (팝업 없음) ──────────────────── */
function toggle(roomNum) {
  if (luggageYes[roomNum]) {
    delete luggageYes[roomNum]; // 짐있음 → 확인필요로 되돌림
  } else {
    luggageYes[roomNum] = true;  // 확인필요 → 짐있음
  }
  saveState();
  render();
}

/* ── 저장 버튼 ──────────────────────────────── */
function updateSaveBtn(yesCount) {
  const btn = document.getElementById('saveBtn');
  if (yesCount > 0) {
    btn.disabled = false;
    btn.textContent = '✓ ' + yesCount + '건 저장하기';
  } else {
    btn.disabled = true;
    btn.textContent = '체크 후 저장';
  }
}

/* ── 저장 확인 팝업 ─────────────────────────── */
function confirmSave() {
  const yesRooms = Object.keys(luggageYes);
  if (!yesRooms.length) { showToast('체크된 항목이 없습니다'); return; }

  // 통계 계산
  let cntTodo = 0;
  Object.entries(FIXED_FLOORS).forEach(function(entry) {
    entry[1].forEach(function(roomNum) {
      const live = getRoomLiveState(roomNum);
      if (live === 'todo' && !luggageYes[roomNum]) cntTodo++;
    });
  });

  const totalCheckable = yesRooms.length + cntTodo;

  const overlay = document.createElement('div');
  overlay.id = 'saveModal';
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `
    <div class="modal-box">
      <div class="modal-title">현재 기록을 저장할까요?</div>
      <div class="modal-stats">
        <div class="stat-box total">
          <div class="stat-num">${totalCheckable}</div>
          <div class="stat-label">확인대상</div>
        </div>
        <div class="stat-box empty">
          <div class="stat-num">${cntTodo}</div>
          <div class="stat-label">짐없음</div>
        </div>
        <div class="stat-box yes">
          <div class="stat-num">${yesRooms.length}</div>
          <div class="stat-label">짐있음</div>
        </div>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeModal()">취소</button>
        <button class="modal-save"   onclick="doSave()">저장</button>
      </div>
    </div>
  `;
  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) closeModal();
  });
  document.body.appendChild(overlay);
}

function closeModal() {
  const m = document.getElementById('saveModal');
  if (m) m.remove();
}

/* ── 실제 저장 ──────────────────────────────── */
async function doSave() {
  closeModal();
  const yesRooms = Object.keys(luggageYes);
  if (!yesRooms.length) return;

  const date    = new Date().toLocaleDateString('ko-KR');
  const results = yesRooms.map(function(r) { return r + '=yes'; }).join(',');
  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=luggage_check&date=' + encodeURIComponent(date) + '&results=' + encodeURIComponent(results)
    });
    showToast('✓ 저장 완료!');
    btn.textContent = '✓ 저장됨';
  } catch(e) {
    btn.disabled = false; btn.textContent = '다시 저장하기';
    showToast('저장 오류 — 잠시 후 다시 시도해주세요');
  }
}

/* ── 토스트 ─────────────────────────────────── */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

/* ── 초기화 ─────────────────────────────────── */
initState();
loadData();
</script>
</body>
</html>
