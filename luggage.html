<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>짐 체크</title>
<style>
:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface2: #222536;
  --border: #2d3148;
  --text: #e8eaf0;
  --text-sub: #7b80a0;
  --accent: #6c7aff;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; color: var(--text); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
.header-left .title { font-size: 18px; font-weight: 800; color: var(--text); }
.header-left .date  { font-size: 11px; color: var(--text-sub); margin-top: 2px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.updated-at { font-size: 11px; color: var(--text-sub); }
.refresh-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 12px; font-size: 13px; cursor: pointer; }

/* ── 알림 바 ── */
.notif-bar { flex-shrink: 0; display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: #12151f; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-sub); cursor: pointer; }
.notif-dot { width: 8px; height: 8px; border-radius: 50%; background: #3a3f60; flex-shrink: 0; }
.notif-dot.on { background: #4ade80; box-shadow: 0 0 5px #4ade80; }

/* ── 요약 바 ── */
.summary-bar { flex-shrink: 0; display: flex; gap: 0; border-bottom: 1px solid var(--border); }
.summary-chip { flex: 1; text-align: center; padding: 8px 4px; border-right: 1px solid var(--border); }
.summary-chip:last-child { border-right: none; }
.summary-num  { font-size: 22px; font-weight: 800; line-height: 1; }
.summary-label { font-size: 10px; color: var(--text-sub); margin-top: 2px; }
.num-wait  { color: #fb923c; }
.num-ready { color: #4ade80; }
.num-done  { color: #2dd4bf; }
.num-empty { color: #6b7199; }

/* ── 스크롤 ── */
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

/* ── 섹션 라벨 ── */
.section-label { padding: 10px 14px 4px; font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.06em; }

/* ── 카드 그리드 ── */
.card-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 4px 12px 14px; }
@media (min-width: 480px) { .card-grid { grid-template-columns: repeat(4, 1fr); } }

.lug-card { border-radius: 12px; border: 1px solid; padding: 10px 8px 8px; display: flex; flex-direction: column; gap: 4px; cursor: default; }
.lug-card.waiting    { background: #2b1800; border-color: #6b3f00; }
.lug-card.ready      { background: #001a0a; border-color: #1a5c35; }
.lug-card.checked-yes { background: #0d2429; border-color: #1a5c52; }
.lug-card.checked-no  { background: #181a27; border-color: #2d3148; }

.lug-room { font-size: 22px; font-weight: 800; line-height: 1; }
.lug-card.waiting     .lug-room { color: #fb923c; }
.lug-card.ready       .lug-room { color: #4ade80; }
.lug-card.checked-yes .lug-room { color: #2dd4bf; }
.lug-card.checked-no  .lug-room { color: #6b7199; }

.lug-status { font-size: 10px; font-weight: 600; color: var(--text-sub); margin-bottom: 2px; }
.lug-btns { display: flex; gap: 4px; }
.lug-btn { flex: 1; padding: 6px 0; border-radius: 6px; border: 1px solid var(--border); font-size: 11px; font-weight: 600; cursor: pointer; background: transparent; color: var(--text-sub); }
.lug-btn.yes { border-color: #1a5c52; color: #2dd4bf; }
.lug-btn.yes.active { background: #0d2429; }
.lug-btn.no.active  { background: #1a1d27; border-color: #4b5180; color: var(--text); }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 13px; line-height: 1.8; grid-column: 1/-1; }

/* ── 저장 버튼 ── */
.save-bar { flex-shrink: 0; padding: 10px 14px; background: var(--surface); border-top: 1px solid var(--border); display: flex; gap: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
.back-btn { display: flex; align-items: center; justify-content: center; padding: 13px 16px; border-radius: 10px; font-size: 15px; font-weight: 700; background: var(--surface2); color: var(--text); text-decoration: none; white-space: nowrap; }
.save-btn { flex: 1; padding: 13px; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; background: var(--accent); color: #fff; }
.save-btn:disabled { background: var(--surface2); color: var(--text-sub); }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 200; transition: transform 0.25s; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="title">🧳 짐 체크</div>
    <div class="date" id="headerDate"></div>
  </div>
  <div class="header-right">
    <div class="updated-at" id="updatedAt">불러오는 중...</div>
    <button class="refresh-btn" onclick="loadData()">↻</button>
  </div>
</div>

<div class="notif-bar" id="notifBar" onclick="toggleNotification()">
  <div class="notif-dot" id="notifDot"></div>
  <span id="notifLabel">탭하여 퇴실 알림 허용</span>
</div>

<div class="summary-bar">
  <div class="summary-chip">
    <div class="summary-num num-wait" id="cntWait">-</div>
    <div class="summary-label">대기중</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-ready" id="cntReady">-</div>
    <div class="summary-label">체크가능</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-done" id="cntDone">-</div>
    <div class="summary-label">짐있음</div>
  </div>
  <div class="summary-chip">
    <div class="summary-num num-empty" id="cntEmpty">-</div>
    <div class="summary-label">없음</div>
  </div>
</div>

<div class="scroll-area" id="scrollArea">
  <div class="section-label" id="waitLabel" style="display:none">🔴 재실중 (방에 있음)</div>
  <div class="card-grid" id="waitGrid"></div>
  <div class="section-label" id="readyLabel" style="display:none">🟢 체크 가능 (외출중 · 퇴실완료)</div>
  <div class="card-grid" id="readyGrid"></div>
</div>

<div class="save-bar">
  <a class="back-btn" href="index.html">← 현황</a>
  <button class="save-btn" id="saveBtn" onclick="saveResults()">결과 저장</button>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

let allRooms = [];
let refreshTimer = null;

// ── sessionStorage 상태 ──────────────────────
let luggageTargets = new Set();  // 오늘 어제입실로 확인된 객실
let luggageWaiting = new Set();  // 직전 갱신 시 투숙중이었던 객실
let luggageChecked = {};         // { 호실: 'yes' | 'no' }

function initState() {
  const today = new Date().toLocaleDateString('ko-KR');
  if (sessionStorage.getItem('lugDate') === today) {
    luggageTargets = new Set(JSON.parse(sessionStorage.getItem('lugTargets') || '[]'));
    luggageWaiting = new Set(JSON.parse(sessionStorage.getItem('lugWaiting') || '[]'));
    luggageChecked = JSON.parse(sessionStorage.getItem('lugChecked') || '{}');
  } else {
    luggageTargets = new Set();
    luggageWaiting = new Set();
    luggageChecked = {};
    sessionStorage.setItem('lugDate', today);
  }
  document.getElementById('headerDate').textContent =
    new Date().toLocaleDateString('ko-KR', { month: 'long', day: 'numeric', weekday: 'short' });
}

function saveState() {
  const today = new Date().toLocaleDateString('ko-KR');
  sessionStorage.setItem('lugDate', today);
  sessionStorage.setItem('lugTargets', JSON.stringify([...luggageTargets]));
  sessionStorage.setItem('lugWaiting', JSON.stringify([...luggageWaiting]));
  sessionStorage.setItem('lugChecked', JSON.stringify(luggageChecked));
}

// ── JSONP ───────────────────────────────────
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    const cb = 'cb_' + Date.now();
    const script = document.createElement('script');
    const timer = setTimeout(function() {
      cleanup(); reject(new Error('timeout'));
    }, 12000);
    window[cb] = function(data) { cleanup(); resolve(data); };
    function cleanup() {
      clearTimeout(timer);
      delete window[cb];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    script.onerror = function() { cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 데이터 로드 ──────────────────────────────
async function loadData() {
  document.getElementById('updatedAt').textContent = '불러오는 중...';
  let data = null;
  for (let attempt = 1; attempt <= 2; attempt++) {
    try {
      data = await fetchJsonp(API + '?action=data');
      break;
    } catch (e) {
      if (attempt === 2) {
        document.getElementById('updatedAt').textContent = '오류: ' + e.message;
        if (refreshTimer) clearTimeout(refreshTimer);
        refreshTimer = setTimeout(loadData, 60000);
        return;
      }
      document.getElementById('updatedAt').textContent = '재시도 중...';
    }
  }
  allRooms = data.rooms || [];
  const t = (data.updatedAt || '').substring(5, 16);
  document.getElementById('updatedAt').textContent = 'RMS: ' + t;
  trackAndRender();
  if (refreshTimer) clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, 60000);
}

// ── 추적 + 퇴실 감지 ─────────────────────────
function trackAndRender() {
  // 어제입실 방을 대상에 추가
  allRooms.filter(r => r.checkinLabel === '어제입실').forEach(r => {
    luggageTargets.add(r.room);
  });

  // 현재 손님이 방 안에 있는(USING) 대상 방만 대기중으로 분류
  // OUT(외출) 상태는 대기중 아님 → 체크가능으로 전환
  const nowWaiting = new Set(
    allRooms.filter(r => r.type === 'normal' && r.occupied && luggageTargets.has(r.room)).map(r => r.room)
  );

  // 이전에 재실 중 → 지금 없음(외출or퇴실) = 알림
  luggageWaiting.forEach(room => {
    if (!nowWaiting.has(room)) fireAlert(room);
  });

  luggageWaiting = nowWaiting;
  saveState();
  render();
}

function fireAlert(room) {
  playBeep();
  if (Notification.permission === 'granted') {
    new Notification('🛎 짐체크 필요', {
      body: room + '호 퇴실 확인됨 — 짐 확인해주세요',
      requireInteraction: true
    });
  }
  showToast('🔔 ' + room + '호 퇴실 — 짐체크 필요!');
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [0, 200, 400].forEach(function(delay) {
      const osc  = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.frequency.value = 900;
      osc.type = 'sine';
      const t = ctx.currentTime + delay / 1000;
      gain.gain.setValueAtTime(0.45, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.4);
    });
  } catch (e) {}
}

// ── 렌더 ─────────────────────────────────────
function render() {
  const targets = [...luggageTargets];

  // 대기중: 손님이 방 안에 있는 경우 (USING = occupied)
  const waiting = allRooms.filter(r => targets.includes(r.room) && r.type === 'normal' && r.occupied)
    .sort((a, b) => a.room.localeCompare(b.room));
  // 체크가능: 퇴실(EMPTY) 또는 외출 중(OUT = !occupied, normal)
  const ready = allRooms.filter(r => targets.includes(r.room) && (r.type === 'empty' || (r.type === 'normal' && !r.occupied)))
    .sort((a, b) => a.room.localeCompare(b.room));

  const doneYes  = Object.values(luggageChecked).filter(v => v === 'yes').length;
  const doneNo   = Object.values(luggageChecked).filter(v => v === 'no').length;

  document.getElementById('cntWait').textContent  = waiting.length;
  document.getElementById('cntReady').textContent = ready.filter(r => !luggageChecked[r.room]).length;
  document.getElementById('cntDone').textContent  = doneYes;
  document.getElementById('cntEmpty').textContent = doneNo;

  const waitLabel  = document.getElementById('waitLabel');
  const readyLabel = document.getElementById('readyLabel');
  const waitGrid   = document.getElementById('waitGrid');
  const readyGrid  = document.getElementById('readyGrid');

  if (targets.length === 0) {
    waitLabel.style.display  = 'none';
    readyLabel.style.display = 'none';
    waitGrid.innerHTML  = '';
    readyGrid.innerHTML = `<div class="empty-state">
      어제 입실 객실이 없습니다<br>
      <span style="font-size:11px;color:#4b5180">오전 9시 이후 데이터 갱신 시 자동 표시</span>
    </div>`;
    document.getElementById('saveBtn').disabled = true;
    return;
  }

  waitLabel.style.display  = waiting.length ? '' : 'none';
  readyLabel.style.display = ready.length   ? '' : 'none';

  waitGrid.innerHTML = waiting.map(r =>
    `<div class="lug-card waiting">
      <div class="lug-room">${r.room}</div>
      <div class="lug-status">재실중</div>
    </div>`
  ).join('');

  readyGrid.innerHTML = ready.map(function(r) {
    const chk = luggageChecked[r.room];
    const cls = chk === 'yes' ? 'checked-yes' : chk === 'no' ? 'checked-no' : 'ready';
    const statusLabel = r.type === 'empty' ? '퇴실완료' : '외출중';
    return `<div class="lug-card ${cls}">
      <div class="lug-room">${r.room}</div>
      <div class="lug-status">${statusLabel}</div>
      <div class="lug-btns">
        <button class="lug-btn yes${chk === 'yes' ? ' active' : ''}" onclick="mark('${r.room}','yes')">짐있음</button>
        <button class="lug-btn no${chk === 'no' ? ' active' : ''}" onclick="mark('${r.room}','no')">없음</button>
      </div>
    </div>`;
  }).join('');

  const hasChecked = Object.keys(luggageChecked).length > 0;
  document.getElementById('saveBtn').disabled = !hasChecked;
  renderNotifBar();
}

function mark(room, val) {
  luggageChecked[room] = val;
  saveState();
  render();
}

// ── 알림 ─────────────────────────────────────
async function toggleNotification() {
  const perm = Notification.permission;
  if (perm === 'granted') {
    showToast('알림이 이미 허용되어 있습니다 ✓');
  } else if (perm === 'denied') {
    showToast('브라우저 설정에서 알림을 허용해주세요');
  } else {
    await Notification.requestPermission();
    renderNotifBar();
    if (Notification.permission === 'granted') showToast('알림 허용됨 ✓');
  }
}

function renderNotifBar() {
  const dot   = document.getElementById('notifDot');
  const label = document.getElementById('notifLabel');
  const perm  = Notification.permission;
  if (perm === 'granted') {
    dot.className = 'notif-dot on';
    label.textContent = '알림 허용됨 — 퇴실 감지 시 자동 알림';
  } else if (perm === 'denied') {
    dot.className = 'notif-dot';
    label.textContent = '알림 차단됨 — 브라우저 설정에서 허용 필요';
  } else {
    dot.className = 'notif-dot';
    label.textContent = '탭하여 퇴실 알림 허용';
  }
}

// ── 저장 ─────────────────────────────────────
async function saveResults() {
  const entries = Object.entries(luggageChecked);
  if (!entries.length) { showToast('체크된 항목이 없습니다'); return; }
  const date    = new Date().toLocaleDateString('ko-KR');
  const results = entries.map(function(e) { return e[0] + '=' + e[1]; }).join(',');
  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=luggage_check&date=' + encodeURIComponent(date) + '&results=' + encodeURIComponent(results)
    });
    showToast('저장 완료 ✓');
  } catch (e) {
    showToast('저장 오류 — 잠시 후 다시 시도해주세요');
  }
}

// ── 토스트 ───────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 3000);
}

// ── 초기화 ───────────────────────────────────
initState();
renderNotifBar();
loadData();
</script>
</body>
</html>
