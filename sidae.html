<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>식대 장부</title>
<style>
:root {
  --bg: #F1E8D3; --surface: #E8DCC0; --surface2: #D8CBA8;
  --border: #C4B898; --text: #33473C; --text-sub: #4A6B5A; --accent: #6B8F71;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); font-family: -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif; color: var(--text); overflow: hidden; }
body { display: flex; flex-direction: column; }

/* ── 헤더 ── */
.header { flex-shrink: 0; background: var(--surface); border-bottom: 1px solid var(--border); padding: 10px 14px; }
.header-row { display: flex; align-items: center; justify-content: space-between; }
.back-link { font-size: 12px; color: var(--text-sub); text-decoration: none; }
.header-title { font-size: 17px; font-weight: 800; }
.month-nav { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 8px; }
.month-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 5px 12px; font-size: 15px; cursor: pointer; }
.month-label { font-size: 15px; font-weight: 700; min-width: 96px; text-align: center; }

/* ── 탭 바 ── */
.tab-bar { flex-shrink: 0; display: flex; background: #D8CBA8; border-bottom: 2px solid var(--border); }
.tab-btn { flex: 1; padding: 11px 0; text-align: center; font-size: 13px; font-weight: 700; color: #4A6B5A; cursor: pointer; border-bottom: 3px solid transparent; }
.tab-btn.active { color: #33473C; border-bottom-color: var(--accent); }

/* ── 컨텐츠 ── */
.content { flex: 1; overflow: hidden; }
.tab-panel { display: none; height: 100%; flex-direction: column; }
.tab-panel.active { display: flex; }
.scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 14px; }

/* ── 폼 공통 ── */
.form-section { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.05em; display: block; margin-bottom: 7px; }
.form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 11px 12px; font-size: 15px; outline: none; -webkit-appearance: none; }
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-sub); }

/* ── 칩 선택 (업체/팀) ── */
.chip-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.chip { padding: 9px 16px; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-sub); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
.chip.selected { border-color: var(--accent); background: #D5E8D9; color: #33473C; }
.chip-empty { font-size: 12px; color: var(--text-sub); padding: 4px 0; }

/* ── 식사 구분 ── */
.meal-toggle { display: flex; gap: 8px; }
.meal-btn { flex: 1; padding: 11px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); color: var(--text-sub); font-size: 14px; font-weight: 700; cursor: pointer; text-align: center; }
.meal-btn.active.jo  { border-color: #6B8F71; background: #D5EFDC; color: #33473C; }
.meal-btn.active.ju  { border-color: #E3A857; background: #FDE8C8; color: #7A4A20; }
.meal-btn.active.suk { border-color: #8FA8C4; background: #DDE6F0; color: #33473C; }

/* ── 품목 선택 칩 ── */
.menu-grid { display: flex; flex-wrap: wrap; gap: 8px; }
.menu-chip { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; transition: all 0.15s; user-select: none; }
.menu-chip .menu-name { font-size: 13px; font-weight: 600; color: var(--text-sub); display: block; }
.menu-chip .menu-price { font-size: 11px; color: #4A6B5A; margin-top: 2px; display: block; }
.menu-chip.selected { border-color: #6B8F71; background: #D5EFDC; cursor: default; }
.menu-chip.selected .menu-name { color: #33473C; }
.menu-chip.selected .menu-price { color: #33473C; font-weight: 700; }
/* 수량 조절 행 */
.qty-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; gap: 6px; }
.qty-btn { background: #D5EFDC; border: 1px solid #6B8F71; color: #33473C; border-radius: 6px; width: 26px; height: 26px; font-size: 18px; line-height: 1; font-weight: 700; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.qty-val { font-size: 15px; font-weight: 800; color: #6B8F71; min-width: 20px; text-align: center; }
.qty-remove { background: none; border: none; color: #C1704F; font-size: 16px; cursor: pointer; padding: 0 2px; line-height: 1; }

/* ── 금액 합산 표시 ── */
.amount-display { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; }
.amount-total { font-size: 22px; font-weight: 800; color: #6B8F71; }
.amount-breakdown { font-size: 11px; color: var(--text-sub); margin-top: 4px; line-height: 1.6; }

/* ── 저장 버튼 ── */
.save-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: var(--accent); color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 4px; }
.save-btn:disabled { background: var(--surface2); color: var(--text-sub); }

/* ── 장부 ── */
.ledger-header { padding: 10px 14px 0; flex-shrink: 0; }
.filter-row { display: flex; gap: 8px; margin-bottom: 8px; }
.filter-select { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 8px 10px; font-size: 14px; }
.total-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.total-label { font-size: 12px; color: var(--text-sub); }
.total-amount { font-size: 20px; font-weight: 800; color: #6B8F71; }
.meal-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.meal-table th { padding: 7px 5px; text-align: left; font-size: 10px; font-weight: 700; color: var(--text-sub); letter-spacing: 0.04em; border-bottom: 1px solid var(--border); }
.meal-table td { padding: 9px 5px; border-bottom: 1px solid var(--border); vertical-align: middle; }
.meal-table tr:last-child td { border-bottom: none; }
.cell-main { font-weight: 600; font-size: 13px; color: var(--text); }
.cell-sub  { font-size: 10px; color: var(--text-sub); margin-top: 2px; }
.meal-tag { display: inline-block; padding: 2px 6px; border-radius: 10px; font-size: 10px; font-weight: 700; }
.tag-조 { background: #0d2b1a; color: #4ade80; }
.tag-중 { background: #1f1a00; color: #fde047; }
.tag-석 { background: #1a0d2e; color: #c4b5fd; }
.num-right { text-align: right; white-space: nowrap; }
.cumul-col { text-align: right; color: #60a5fa; font-size: 11px; white-space: nowrap; }
.del-btn { background: none; border: none; color: #3a3f60; font-size: 18px; cursor: pointer; padding: 0 4px; }
.del-btn:active { color: #f87171; }

/* ── 정산 ── */
.vendor-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px; }
.vendor-name-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.vendor-name { font-size: 16px; font-weight: 700; }
.vendor-count { font-size: 12px; color: var(--text-sub); }
.vendor-total { font-size: 22px; font-weight: 800; color: #4ade80; margin-bottom: 10px; }
.meal-stat-row { display: flex; gap: 8px; margin-bottom: 10px; }
.meal-stat { flex: 1; background: var(--surface2); border-radius: 8px; padding: 7px; text-align: center; }
.meal-stat-num   { font-size: 15px; font-weight: 700; }
.meal-stat-label { font-size: 10px; color: var(--text-sub); margin-top: 2px; }
.print-btn { width: 100%; padding: 10px; border: 1px solid var(--accent); border-radius: 8px; background: transparent; color: var(--accent); font-size: 13px; font-weight: 600; cursor: pointer; }
.excel-btn-wrap { margin-bottom: 14px; }
.excel-btn { width: 100%; padding: 14px; border: 1px solid #1a5c35; border-radius: 10px; background: #001a0a; color: #4ade80; font-size: 15px; font-weight: 700; cursor: pointer; }

/* ── 설정 탭 ── */
.settings-section { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 12px; }
.settings-title { font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 10px; }
.manage-chip { display: inline-flex; align-items: center; gap: 5px; padding: 5px 10px; border-radius: 16px; border: 1px solid var(--border); background: var(--surface2); font-size: 12px; color: var(--text); }
.manage-chip .chip-del { background: none; border: none; color: var(--text-sub); font-size: 14px; cursor: pointer; padding: 0; line-height: 1; }
.manage-chip .chip-del:active { color: #f87171; }
/* 업체·팀 계층 구조 */
.vendor-block { border: 1px solid var(--border); border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; background: var(--bg); }
.vendor-block-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.vendor-block-name { font-size: 15px; font-weight: 700; }
.team-area { padding-left: 10px; border-left: 2px solid var(--border); }
.team-chip-row { display: flex; flex-wrap: wrap; gap: 6px; min-height: 16px; margin-bottom: 6px; }
.team-none { font-size: 11px; color: #3a3f60; font-style: italic; }
.team-add-row { display: flex; gap: 6px; align-items: center; }
.team-add-row input { flex: 1; background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); padding: 6px 8px; font-size: 13px; outline: none; }
.team-add-row input:focus { border-color: var(--accent); }
.team-add-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text-sub); border-radius: 6px; padding: 6px 10px; font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; }
.team-add-btn:active { background: var(--accent); color: #fff; border-color: var(--accent); }
/* 품목 관리 */
.menu-manage-item { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); }
.menu-manage-item:last-child { border-bottom: none; }
.menu-manage-name { font-size: 14px; font-weight: 600; }
.menu-manage-price { font-size: 13px; color: var(--text-sub); }
.add-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; }
.add-row .form-input { flex: 1; padding: 9px 10px; font-size: 14px; }
.add-btn { background: var(--accent); border: none; color: #fff; border-radius: 8px; padding: 9px 14px; font-size: 14px; font-weight: 700; cursor: pointer; white-space: nowrap; }

/* ── 빈 상태 ── */
.empty-state { text-align: center; padding: 40px 20px; color: var(--text-sub); font-size: 13px; line-height: 1.8; }

/* ── 거래명세서 ── */
#printArea { display: none; position: fixed; inset: 0; background: #fff; color: #000; z-index: 999; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 24px; font-family: 'Malgun Gothic', sans-serif; }
.print-close { position: fixed; top: 12px; right: 12px; background: #333; color: #fff; border: none; border-radius: 6px; padding: 8px 14px; cursor: pointer; font-size: 13px; z-index: 1000; }
.print-action { display: inline-block; margin-bottom: 12px; margin-right: 8px; background: #1a1d27; color: #fff; border: none; border-radius: 6px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
.명세서-title { text-align: center; font-size: 22px; font-weight: bold; letter-spacing: 0.15em; margin-bottom: 6px; }
.명세서-sub   { text-align: center; font-size: 13px; color: #555; margin-bottom: 14px; }
.명세서-table { width: 100%; border-collapse: collapse; font-size: 12px; margin-bottom: 6px; }
.명세서-table th, .명세서-table td { border: 1px solid #bbb; padding: 6px 8px; }
.명세서-table th { background: #f0f0f0; font-weight: bold; text-align: center; }
.명세서-table td { text-align: center; }
.명세서-table td.left { text-align: left; }
.명세서-table td.right { text-align: right; }
/* 팀 구분 헤더 행 */
.team-header-row td { background: #e8eef8; font-weight: bold; font-size: 12px; text-align: left; padding: 6px 10px; color: #1a3a6a; border-color: #9baac8; }
/* 팀 소계 행 */
.subtotal-row td { background: #f0f4ff; font-weight: bold; border-color: #9baac8; }
/* 합계/VAT 섹션 */
.명세서-total-box { margin-top: 10px; border: 1px solid #bbb; border-collapse: collapse; width: 100%; font-size: 13px; }
.명세서-total-box td { border: 1px solid #bbb; padding: 7px 10px; }
.명세서-total-box .label { font-weight: bold; }
.명세서-total-box .grand { background: none; color: #000; font-weight: 900; font-size: 15px; border-top: 2px solid #555; }
/* 페이지 번호 */
.print-page-footer { display: none; }
@media print {
  html, body { overflow: visible !important; height: auto !important; }
  body > *:not(#printArea) { display: none !important; }
  #printArea { display: block !important; position: static !important; overflow: visible !important; height: auto !important; padding: 12px !important; }
  .print-close, .print-action { display: none !important; }
  .print-page-footer { display: block; }
  @page { margin: 15mm 12mm; @bottom-center { content: "- " counter(page) " -"; font-size: 11pt; color: #555; } }
}
/* ── 부가세 선택 모달 ── */
#vatModal { display: none; position: fixed; inset: 0; background: rgba(33,47,40,0.5); z-index: 600; align-items: center; justify-content: center; }
.vat-box { background: #fff; color: #111; border-radius: 16px; padding: 24px 20px; width: 300px; max-width: 90vw; }
.vat-box-title { font-size: 16px; font-weight: 800; text-align: center; margin-bottom: 18px; }
.vat-option { display: flex; align-items: center; gap: 12px; padding: 12px 14px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer; margin-bottom: 10px; font-size: 15px; font-weight: 600; }
.vat-option input[type=radio] { width: 20px; height: 20px; cursor: pointer; accent-color: #2563eb; }
.vat-option.selected { border-color: #2563eb; background: #eff3ff; color: #2563eb; }
.vat-modal-btns { display: flex; gap: 10px; margin-top: 6px; }
.vat-cancel-btn { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; background: #f5f5f5; font-size: 15px; font-weight: 600; cursor: pointer; }
.vat-confirm-btn { flex: 2; padding: 12px; border: none; border-radius: 10px; background: #1a1d27; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; }

/* ── 토스트 ── */
.toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: #222; color: #fff; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 300; transition: transform 0.25s; white-space: nowrap; border: 1px solid var(--border); pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <a class="back-link" href="index.html">← 현황</a>
    <div class="header-title">🍱 식대 장부</div>
    <div style="width:44px"></div>
  </div>
  <div class="month-nav">
    <button class="month-btn" onclick="changeMonth(-1)">◀</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="month-btn" onclick="changeMonth(1)">▶</button>
  </div>
</div>

<div class="tab-bar">
  <div class="tab-btn active" data-tab="input"   onclick="switchTab('input')">입력</div>
  <div class="tab-btn"        data-tab="ledger"  onclick="switchTab('ledger')">장부</div>
  <div class="tab-btn"        data-tab="settle"  onclick="switchTab('settle')">정산</div>
  <div class="tab-btn"        data-tab="settings" onclick="switchTab('settings')">⚙ 설정</div>
</div>

<div class="content">

  <!-- ── 입력 탭 ── -->
  <div class="tab-panel active" id="tab-input">
    <div class="scroll-area">

      <div class="form-section">
        <label class="form-label">날짜</label>
        <input class="form-input" type="date" id="inputDate">
      </div>

      <div class="form-section">
        <label class="form-label">업체명</label>
        <div class="chip-grid" id="vendorChips"></div>
      </div>

      <div class="form-section" id="teamSection" style="display:none">
        <label class="form-label">팀 <span id="teamSectionVendor" style="color:var(--accent)"></span></label>
        <div class="chip-grid" id="teamChips"></div>
      </div>

      <div class="form-section">
        <label class="form-label">식사 구분</label>
        <div class="meal-toggle">
          <div class="meal-btn active jo"  data-meal="조식" onclick="selectMeal(this)">조식</div>
          <div class="meal-btn ju"  data-meal="중식" onclick="selectMeal(this)">중식</div>
          <div class="meal-btn suk" data-meal="석식" onclick="selectMeal(this)">석식</div>
        </div>
      </div>

      <div class="form-section">
        <label class="form-label">품목 선택 (복수 선택 가능)</label>
        <div class="menu-grid" id="menuChips"></div>
      </div>

      <div class="form-section">
        <label class="form-label">합계 금액</label>
        <div class="amount-display">
          <div class="amount-total" id="amountTotal">0원</div>
          <div class="amount-breakdown" id="amountBreakdown" style="display:none"></div>
        </div>
      </div>

      <button class="save-btn" id="saveBtn" onclick="addRecord()">저장</button>

    </div>
  </div>

  <!-- ── 장부 탭 ── -->
  <div class="tab-panel" id="tab-ledger">
    <div class="ledger-header">
      <div class="filter-row">
        <select class="filter-select" id="filterVendor" onchange="renderLedger()">
          <option value="">전체 업체</option>
        </select>
        <select class="filter-select" id="filterTeam" onchange="renderLedger()" style="flex:0.7">
          <option value="">전체 팀</option>
        </select>
      </div>
      <div class="total-bar">
        <div class="total-label" id="totalLabel">합계</div>
        <div class="total-amount" id="totalAmount">-</div>
      </div>
    </div>
    <div class="scroll-area" style="padding-top:4px">
      <table class="meal-table">
        <thead>
          <tr>
            <th>날짜</th>
            <th>구분</th>
            <th>업체 / 팀 / 품목</th>
            <th class="num-right">금액</th>
            <th class="cumul-col">누계</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
      </table>
      <div id="ledgerEmpty" class="empty-state" style="display:none">이번달 기록이 없습니다</div>
    </div>
  </div>

  <!-- ── 정산 탭 ── -->
  <div class="tab-panel" id="tab-settle">
    <div class="scroll-area">
      <div class="excel-btn-wrap">
        <button class="excel-btn" onclick="downloadExcel()">📥 전체 엑셀 다운로드</button>
      </div>
      <div id="vendorSummary"></div>
    </div>
  </div>

  <!-- ── 설정 탭 ── -->
  <div class="tab-panel" id="tab-settings">
    <div class="scroll-area">

      <div class="settings-section">
        <div class="settings-title">🏪 업체 · 팀 관리</div>
        <div id="vendorManageList"></div>
        <div class="add-row">
          <input class="form-input" id="newVendorInput" placeholder="업체명 입력">
          <button class="add-btn" onclick="addVendor()">추가</button>
        </div>
      </div>

      <div class="settings-section">
        <div class="settings-title">🍽 품목 관리</div>
        <div id="menuManageList"></div>
        <div class="add-row" style="flex-wrap:wrap; gap:6px;">
          <input class="form-input" id="newMenuName" placeholder="품목명" style="flex:2;min-width:100px">
          <input class="form-input" id="newMenuPrice" type="number" placeholder="금액" inputmode="numeric" style="flex:1;min-width:70px">
          <button class="add-btn" onclick="addMenuItem()">추가</button>
        </div>
      </div>

    </div>
  </div>

</div>

<!-- 부가세 선택 모달 -->
<div id="vatModal">
  <div class="vat-box">
    <div class="vat-box-title">거래명세서 출력 옵션</div>
    <label class="vat-option selected" id="vatOpt1" onclick="selectVat('no')">
      <input type="radio" name="vatOpt" value="no" checked> 부가세 포함 안 함
    </label>
    <label class="vat-option" id="vatOpt2" onclick="selectVat('yes')">
      <input type="radio" name="vatOpt" value="yes"> 부가세 10% 포함
    </label>
    <div class="vat-modal-btns">
      <button class="vat-cancel-btn" onclick="document.getElementById('vatModal').style.display='none'">취소</button>
      <button class="vat-confirm-btn" onclick="confirmPrint()">출력</button>
    </div>
  </div>
</div>

<!-- 거래명세서 -->
<div id="printArea">
  <button class="print-close" onclick="closePrint()">✕ 닫기</button>
  <button class="print-action" onclick="window.print()">🖨 인쇄</button>
  <div id="printContent"></div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbywu4tvvqEaNXNnRr65W8Fq9gFdMXv3--xPnEoDjTv02I_49sT_VrW00-VE13PEyW0p/exec';

let records = [];
let currentMonth = new Date();
currentMonth.setDate(1);
let selectedMeal   = '조식';
let selectedVendor = '';
let selectedTeam   = '';
let selectedMenus  = {};   // { menuName: { price, qty } }

// ── localStorage 헬퍼 ────────────────────────
// vendors: [{name, teams:[]}] 구조
function getVendors() {
  var raw = JSON.parse(localStorage.getItem('sd_vendors') || '[]');
  // 구버전 마이그레이션 (string[] → object[])
  if (raw.length && typeof raw[0] === 'string') {
    raw = raw.map(function(n){ return { name: n, teams: [] }; });
    saveVendors(raw);
  }
  return raw;
}
function saveVendors(v) { localStorage.setItem('sd_vendors', JSON.stringify(v)); }
function getMenus() {
  var raw = JSON.parse(localStorage.getItem('sd_menus') || '[]');
  return raw.slice().sort(function(a, b) {
    return (a.price - b.price) || a.name.localeCompare(b.name, 'ko');
  });
}
function saveMenus(m) { localStorage.setItem('sd_menus', JSON.stringify(m)); }

// ── 초기화 ───────────────────────────────────
function init() {
  document.getElementById('inputDate').value = toDateStr(new Date());
  renderMonthLabel();
  renderInputChips();
  renderSettings();
  loadData();
}

function toDateStr(d) {
  return d.getFullYear() + '-'
    + String(d.getMonth()+1).padStart(2,'0') + '-'
    + String(d.getDate()).padStart(2,'0');
}
function getMonthStr() {
  return currentMonth.getFullYear() + '-' + String(currentMonth.getMonth()+1).padStart(2,'0');
}
function getMonthDisplay() {
  return currentMonth.getFullYear() + '년 ' + (currentMonth.getMonth()+1) + '월';
}

// ── 월 이동 ──────────────────────────────────
function changeMonth(dir) {
  currentMonth = new Date(currentMonth.getFullYear(), currentMonth.getMonth()+dir, 1);
  renderMonthLabel();
  loadData();
}
function renderMonthLabel() {
  document.getElementById('monthLabel').textContent = getMonthDisplay();
}

// ── JSONP ────────────────────────────────────
function fetchJsonp(url) {
  return new Promise(function(resolve, reject) {
    var cb = 'cb_' + Date.now();
    var script = document.createElement('script');
    var timer = setTimeout(function(){ cleanup(); reject(new Error('timeout')); }, 14000);
    window[cb] = function(data){ cleanup(); resolve(data); };
    function cleanup(){ clearTimeout(timer); delete window[cb]; if(script.parentNode) script.parentNode.removeChild(script); }
    script.onerror = function(){ cleanup(); reject(new Error('network error')); };
    script.src = url + '&callback=' + cb;
    document.body.appendChild(script);
  });
}

// ── 데이터 로드 ──────────────────────────────
async function loadData() {
  try {
    var data = await fetchJsonp(API + '?action=meal_list&month=' + getMonthStr());
    records = data.records || [];
    renderAll();
  } catch(e) {
    showToast('로드 실패: ' + e.message);
  }
}

function renderAll() {
  renderLedger();
  renderSettle();
  renderLedgerFilters();
}

// ── 입력 칩 렌더 ─────────────────────────────
function renderInputChips() {
  // 업체 칩
  var vendors = getVendors();
  var vGrid = document.getElementById('vendorChips');
  if (!vendors.length) {
    vGrid.innerHTML = '<span class="chip-empty">⚙ 설정 탭에서 업체를 등록해주세요</span>';
  } else {
    vGrid.innerHTML = vendors.map(function(v) {
      var sel = v.name === selectedVendor ? ' selected' : '';
      return '<div class="chip' + sel + '" onclick="selectVendor(\'' + esc(v.name) + '\')">' + v.name + '</div>';
    }).join('');
  }

  // 팀 칩 — 선택된 업체의 팀만 표시
  var tSection = document.getElementById('teamSection');
  var tGrid    = document.getElementById('teamChips');
  var vObj     = vendors.find(function(v){ return v.name === selectedVendor; });
  if (!selectedVendor || !vObj || !vObj.teams.length) {
    tSection.style.display = 'none';
    selectedTeam = '';  // 업체 바뀌면 팀 초기화
  } else {
    tSection.style.display = 'block';
    document.getElementById('teamSectionVendor').textContent = '— ' + selectedVendor;
    tGrid.innerHTML = vObj.teams.map(function(t) {
      var sel = t === selectedTeam ? ' selected' : '';
      return '<div class="chip' + sel + '" onclick="selectTeam(\'' + esc(t) + '\')">' + t + '</div>';
    }).join('');
  }

  // 품목 칩
  var menus = getMenus();
  var mGrid = document.getElementById('menuChips');
  if (!menus.length) {
    mGrid.innerHTML = '<span class="chip-empty">⚙ 설정 탭에서 품목을 등록해주세요</span>';
  } else {
    mGrid.innerHTML = menus.map(function(m) {
      var entry = selectedMenus[m.name];
      if (entry) {
        // 선택됨 → 수량 조절 UI 표시
        var lineTotal = entry.price * entry.qty;
        return '<div class="menu-chip selected">'
          + '<span class="menu-name">' + m.name + '</span>'
          + '<div class="qty-row">'
          +   '<button class="qty-btn" onclick="changeQty(\'' + esc(m.name) + '\',-1)">−</button>'
          +   '<span class="qty-val">' + entry.qty + '</span>'
          +   '<button class="qty-btn" onclick="changeQty(\'' + esc(m.name) + '\',1)">+</button>'
          +   '<button class="qty-remove" onclick="removeMenu(\'' + esc(m.name) + '\')">×</button>'
          + '</div>'
          + '<span class="menu-price">' + fmt(lineTotal) + '원</span>'
          + '</div>';
      } else {
        // 미선택 → 탭하면 선택
        return '<div class="menu-chip" onclick="toggleMenu(\'' + esc(m.name) + '\',' + m.price + ')">'
          + '<span class="menu-name">' + m.name + '</span>'
          + '<span class="menu-price">' + fmt(m.price) + '원</span>'
          + '</div>';
      }
    }).join('');
  }

  updateAmountDisplay();
}

// ── 선택 ─────────────────────────────────────
function selectVendor(v) {
  if (selectedVendor === v) { selectedVendor = ''; selectedTeam = ''; }
  else { selectedVendor = v; selectedTeam = ''; }
  renderInputChips();
}
function selectTeam(t) {
  selectedTeam = (selectedTeam === t) ? '' : t;
  renderInputChips();
}
function toggleMenu(name, price) {
  selectedMenus[name] = { price: price, qty: 1 };
  renderInputChips();
}
function changeQty(name, delta) {
  if (!selectedMenus[name]) return;
  var newQty = selectedMenus[name].qty + delta;
  if (newQty < 1) { delete selectedMenus[name]; }
  else { selectedMenus[name].qty = newQty; }
  renderInputChips();
}
function removeMenu(name) {
  delete selectedMenus[name];
  renderInputChips();
}
function selectMeal(el) {
  document.querySelectorAll('.meal-btn').forEach(function(b){ b.classList.remove('active'); });
  el.classList.add('active');
  selectedMeal = el.dataset.meal;
}

function updateAmountDisplay() {
  var entries = Object.entries(selectedMenus);
  var total = entries.reduce(function(s, e){ return s + e[1].price * e[1].qty; }, 0);
  document.getElementById('amountTotal').textContent = fmt(total) + '원';
  var breakdown = document.getElementById('amountBreakdown');
  if (entries.length > 0) {
    breakdown.style.display = 'block';
    breakdown.textContent = entries.map(function(e){
      var line = e[1].price * e[1].qty;
      return e[0] + (e[1].qty > 1 ? ' ×' + e[1].qty : '') + '  ' + fmt(line) + '원';
    }).join('\n');
  } else {
    breakdown.style.display = 'none';
  }
}

// ── 저장 ─────────────────────────────────────
async function addRecord() {
  var date   = document.getElementById('inputDate').value;
  var amount = Object.entries(selectedMenus).reduce(function(s,e){ return s + e[1].price * e[1].qty; }, 0);
  // 품목 문자열: "설렁탕×2,김치찌개×1" (수량 1이면 "설렁탕")
  var itemNames = Object.entries(selectedMenus).map(function(e){
    return e[0] + (e[1].qty > 1 ? '×' + e[1].qty : '');
  }).join(',');

  if (!date)           { showToast('날짜를 입력해주세요'); return; }
  if (!selectedVendor) { showToast('업체를 선택해주세요'); return; }
  if (!itemNames)      { showToast('품목을 선택해주세요'); return; }

  var btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '저장 중...';

  try {
    await fetch(API, {
      method: 'POST', mode: 'no-cors',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'action=meal_add'
        + '&date='     + encodeURIComponent(date)
        + '&vendor='   + encodeURIComponent(selectedVendor)
        + '&team='     + encodeURIComponent(selectedTeam)
        + '&mealType=' + encodeURIComponent(selectedMeal)
        + '&item='     + encodeURIComponent(itemNames)
        + '&amount='   + amount
    });
    showToast('저장 완료 ✓');
    selectedMenus = {};
    renderInputChips();
    setTimeout(loadData, 1500);
  } catch(e) {
    showToast('저장 오류');
  } finally {
    btn.disabled = false; btn.textContent = '저장';
  }
}

// ── 장부 필터 ────────────────────────────────
function renderLedgerFilters() {
  var vendors = [...new Set(records.map(function(r){ return r.vendor; }).filter(Boolean))].sort();
  var teams   = [...new Set(records.map(function(r){ return r.team;   }).filter(Boolean))].sort();
  var curV = document.getElementById('filterVendor').value;
  var curT = document.getElementById('filterTeam').value;
  document.getElementById('filterVendor').innerHTML = '<option value="">전체 업체</option>'
    + vendors.map(function(v){ return '<option value="'+v+'"'+(v===curV?' selected':'')+'>'+v+'</option>'; }).join('');
  // 팀 필터: 업체 선택 시 해당 업체 팀만
  var teamsForFilter = curV
    ? [...new Set(records.filter(function(r){ return r.vendor===curV&&r.team; }).map(function(r){ return r.team; }))].sort()
    : teams;
  document.getElementById('filterTeam').innerHTML = '<option value="">전체 팀</option>'
    + teamsForFilter.map(function(t){ return '<option value="'+t+'"'+(t===curT?' selected':'')+'>'+t+'</option>'; }).join('');
}

// ── 장부 렌더 ────────────────────────────────
function renderLedger() {
  var fv = document.getElementById('filterVendor').value;
  var ft = document.getElementById('filterTeam').value;
  var filtered = records.filter(function(r){
    return (!fv || r.vendor === fv) && (!ft || r.team === ft);
  }).slice().sort(function(a,b){ return a.date.localeCompare(b.date)||(a.id-b.id); });

  var total = filtered.reduce(function(s,r){ return s+r.amount; }, 0);
  document.getElementById('totalLabel').textContent = (fv||ft) ? (fv||'전체')+' '+(ft||'전체') : getMonthDisplay()+' 합계';
  document.getElementById('totalAmount').textContent = fmt(total)+'원';

  var body  = document.getElementById('ledgerBody');
  var empty = document.getElementById('ledgerEmpty');
  if (!filtered.length) { body.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  var cumulMap = {};
  body.innerHTML = filtered.map(function(r) {
    var key = r.vendor+(r.team||'');
    cumulMap[key] = (cumulMap[key]||0) + r.amount;
    var tagCls = { 조식:'tag-조', 중식:'tag-중', 석식:'tag-석' };
    return '<tr>'
      + '<td style="font-size:11px;white-space:nowrap">' + r.date.slice(5) + '</td>'
      + '<td><span class="meal-tag '+(tagCls[r.mealType]||'')+'">'+(r.mealType?r.mealType[0]:'-')+'</span></td>'
      + '<td><div class="cell-main">' + r.vendor + (r.team ? ' <span style="color:var(--text-sub);font-weight:400;font-size:11px">('+r.team+')</span>' : '') + '</div>'
        + '<div class="cell-sub">' + (r.item||'') + '</div></td>'
      + '<td class="num-right">' + fmt(r.amount) + '</td>'
      + '<td class="cumul-col">' + fmt(cumulMap[key]) + '</td>'
      + '<td><button class="del-btn" onclick="deleteRecord('+r.id+')">×</button></td>'
      + '</tr>';
  }).join('');
}

// ── 정산 렌더 ────────────────────────────────
function renderSettle() {
  var vendors = [...new Set(records.map(function(r){ return r.vendor; }).filter(Boolean))].sort();
  var container = document.getElementById('vendorSummary');
  if (!vendors.length) { container.innerHTML='<div class="empty-state">이번달 기록이 없습니다</div>'; return; }

  container.innerHTML = vendors.map(function(v) {
    var vr = records.filter(function(r){ return r.vendor===v; });
    var total = vr.reduce(function(s,r){ return s+r.amount; }, 0);
    return '<div class="vendor-card">'
      + '<div class="vendor-name-row"><div class="vendor-name">'+v+'</div><div class="vendor-count">'+vr.length+'건</div></div>'
      + '<div class="vendor-total">'+fmt(total)+'원</div>'
      + '<div class="meal-stat-row">'
      + ['조식','중식','석식'].map(function(m){
          var c=vr.filter(function(r){return r.mealType===m;}).length;
          var col=m==='조식'?'#4ade80':m==='중식'?'#fde047':'#c4b5fd';
          return '<div class="meal-stat"><div class="meal-stat-num" style="color:'+col+'">'+c+'</div><div class="meal-stat-label">'+m+'</div></div>';
        }).join('')
      + '</div>'
      + '<button class="print-btn" onclick="printVendor(\''+esc(v)+'\')">🖨 거래명세서 출력</button>'
      + '</div>';
  }).join('');
}

// ── 삭제 ─────────────────────────────────────
async function deleteRecord(rowId) {
  if (!confirm('삭제할까요?')) return;
  try {
    await fetch(API, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:'action=meal_delete&rowId='+rowId
    });
    showToast('삭제 완료');
    setTimeout(loadData, 1200);
  } catch(e) { showToast('삭제 오류'); }
}

// ── 거래명세서 ───────────────────────────────
function printVendor(vendor) {
  document.getElementById('vatModal').dataset.vendor = vendor;
  document.querySelector('input[name="vatOpt"][value="no"]').checked = true;
  selectVat('no');
  document.getElementById('vatModal').style.display = 'flex';
}

function selectVat(val) {
  document.getElementById('vatOpt1').classList.toggle('selected', val === 'no');
  document.getElementById('vatOpt2').classList.toggle('selected', val === 'yes');
  document.querySelector('input[name="vatOpt"][value="'+val+'"]').checked = true;
}

function confirmPrint() {
  var vendor = document.getElementById('vatModal').dataset.vendor;
  var withVat = document.querySelector('input[name="vatOpt"]:checked').value === 'yes';
  document.getElementById('vatModal').style.display = 'none';
  doOpenPrint(vendor, withVat);
}

function doOpenPrint(vendor, withVat) {
  // 해당 업체 데이터: 팀 → 날짜 → ID 순 정렬
  var vr = records.filter(function(r){ return r.vendor === vendor; })
    .sort(function(a,b){
      var ta = a.team || '', tb = b.team || '';
      return ta.localeCompare(tb) || a.date.localeCompare(b.date) || (a.id - b.id);
    });

  // 팀 목록 (등장 순서 유지)
  var teams = [], teamMap = {};
  vr.forEach(function(r) {
    var t = r.team || '(팀 미지정)';
    if (!teamMap[t]) { teamMap[t] = []; teams.push(t); }
    teamMap[t].push(r);
  });

  var grandTotal = 0;
  var teamTotals = [];
  var bodyHtml = '';

  teams.forEach(function(team) {
    var rows = teamMap[team];
    var teamTotal = 0;

    // 팀 구분 헤더 행
    bodyHtml += '<tr class="team-header-row"><td colspan="4">▶ ' + team + '</td></tr>';

    rows.forEach(function(r) {
      teamTotal += r.amount;
      bodyHtml += '<tr>'
        + '<td>' + r.date + '</td>'
        + '<td>' + (r.mealType || '') + '</td>'
        + '<td class="left">' + (r.item || '') + '</td>'
        + '<td class="right">' + fmt(r.amount) + '</td>'
        + '</tr>';
    });

    // 팀 소계 행
    bodyHtml += '<tr class="subtotal-row">'
      + '<td colspan="3" class="right">소계</td>'
      + '<td class="right">' + fmt(teamTotal) + '원</td>'
      + '</tr>';

    grandTotal += teamTotal;
    teamTotals.push({ team: team, total: teamTotal });
  });

  // 팀별 소계 요약표
  var summaryHtml = '<table class="명세서-table" style="margin-top:14px;">'
    + '<thead><tr><th colspan="2" style="text-align:left;background:#e8eef8;color:#1a3a6a;padding:7px 10px;">팀별 소계</th></tr></thead><tbody>';
  teamTotals.forEach(function(s) {
    summaryHtml += '<tr>'
      + '<td class="left" style="font-weight:600;">' + s.team + '</td>'
      + '<td class="right" style="font-weight:600;">' + fmt(s.total) + '원</td>'
      + '</tr>';
  });
  summaryHtml += '</tbody></table>';

  // 합계 / 부가세
  var totalHtml = '';
  if (withVat) {
    var vat = Math.round(grandTotal * 0.1);
    var finalTotal = grandTotal + vat;
    totalHtml = '<table class="명세서-total-box" style="margin-top:6px;">'
      + '<tr><td class="label" style="width:60%;">공급가액</td><td class="right">' + fmt(grandTotal) + '원</td></tr>'
      + '<tr><td class="label">부가세 (10%)</td><td class="right">' + fmt(vat) + '원</td></tr>'
      + '<tr><td class="label grand">합 계</td><td class="right grand">' + fmt(finalTotal) + '원</td></tr>'
      + '</table>';
  } else {
    totalHtml = '<table class="명세서-total-box" style="margin-top:6px;">'
      + '<tr><td class="label grand" style="width:60%;">합 계</td><td class="right grand">' + fmt(grandTotal) + '원</td></tr>'
      + '</table>';
  }

  document.getElementById('printContent').innerHTML =
    '<div class="명세서-title">거 래 명 세 서</div>'
    + '<div class="명세서-sub">공급받는자: ' + vendor + '&nbsp;&nbsp;|&nbsp;&nbsp;기간: ' + getMonthDisplay() + '</div>'
    + '<table class="명세서-table"><thead>'
    + '<tr><th>날짜</th><th>구분</th><th style="text-align:left;">품목</th><th>금액</th></tr>'
    + '</thead><tbody>' + bodyHtml + '</tbody></table>'
    + summaryHtml
    + totalHtml
    + '<div class="print-page-footer" style="margin-top:24px;text-align:center;font-size:11px;color:#555;border-top:1px solid #ccc;padding-top:6px;">'
    + vendor + ' · ' + getMonthDisplay() + ' 거래명세서'
    + '</div>';

  document.getElementById('printArea').style.display = 'block';
}

function closePrint() { document.getElementById('printArea').style.display = 'none'; }

// ── 엑셀 다운로드 ────────────────────────────
function downloadExcel() {
  if (!records.length) { showToast('데이터가 없습니다'); return; }
  var wb = XLSX.utils.book_new();
  var vendors = [...new Set(records.map(function(r){ return r.vendor; }).filter(Boolean))].sort();
  vendors.forEach(function(v) {
    var vr = records.filter(function(r){ return r.vendor===v; })
      .sort(function(a,b){ return a.date.localeCompare(b.date)||(a.id-b.id); });
    var cumul=0;
    var rows=[['날짜','팀','식사구분','품목','금액','누계금액']];
    vr.forEach(function(r){ cumul+=r.amount; rows.push([r.date,r.team||'',r.mealType||'',r.item||'',r.amount,cumul]); });
    rows.push(['','','','합계',vr.reduce(function(s,r){return s+r.amount;},0),'']);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:13},{wch:10},{wch:8},{wch:22},{wch:11},{wch:13}];
    XLSX.utils.book_append_sheet(wb, ws, v.slice(0,31));
  });
  XLSX.writeFile(wb, '식대장부_'+getMonthStr()+'.xlsx');
  showToast('엑셀 다운로드 완료');
}

// ── 설정 탭 ──────────────────────────────────
function renderSettings() {
  // 업체·팀 목록 (계층 구조)
  var vendors = getVendors();
  document.getElementById('vendorManageList').innerHTML = vendors.length
    ? vendors.map(function(v, vi) {
        var teamHtml = v.teams.length
          ? v.teams.map(function(t, ti){
              return '<div class="manage-chip">' + t
                + '<button class="chip-del" onclick="removeTeamFromVendor('+vi+','+ti+')">×</button></div>';
            }).join('')
          : '<span class="team-none">(팀 없음)</span>';
        return '<div class="vendor-block">'
          + '<div class="vendor-block-header">'
          +   '<div class="vendor-block-name">' + v.name + '</div>'
          +   '<button class="del-btn" onclick="removeVendor('+vi+')" style="color:#3a3f60">×</button>'
          + '</div>'
          + '<div class="team-area">'
          +   '<div class="team-chip-row">' + teamHtml + '</div>'
          +   '<div class="team-add-row">'
          +     '<input id="newTeam_'+vi+'" placeholder="팀명 입력" onkeydown="if(event.key===\'Enter\')addTeamToVendor('+vi+')">'
          +     '<button class="team-add-btn" onclick="addTeamToVendor('+vi+')">+ 팀 추가</button>'
          +   '</div>'
          + '</div>'
          + '</div>';
      }).join('')
    : '<div style="font-size:12px;color:var(--text-sub);padding:8px 0">등록된 업체 없음</div>';

  // 품목 목록
  var menus = getMenus();
  document.getElementById('menuManageList').innerHTML = menus.length
    ? menus.map(function(m, i){
        return '<div class="menu-manage-item">'
          +'<div><div class="menu-manage-name">'+m.name+'</div></div>'
          +'<div style="display:flex;align-items:center;gap:10px">'
          +'<div class="menu-manage-price">'+fmt(m.price)+'원</div>'
          +'<button class="del-btn" onclick="removeMenuItem('+i+')">×</button>'
          +'</div></div>';
      }).join('')
    : '<div style="font-size:12px;color:var(--text-sub);padding:4px 0">등록된 품목 없음</div>';
}

function addVendor() {
  var n = document.getElementById('newVendorInput').value.trim();
  if (!n) return;
  var vendors = getVendors();
  if (vendors.find(function(v){ return v.name===n; })) { showToast('이미 등록된 업체입니다'); return; }
  vendors.push({ name: n, teams: [] });
  saveVendors(vendors);
  document.getElementById('newVendorInput').value = '';
  renderSettings();
  renderInputChips();
}
function removeVendor(idx) {
  var vendors = getVendors();
  var removed = vendors.splice(idx, 1)[0];
  saveVendors(vendors);
  if (removed && selectedVendor === removed.name) { selectedVendor = ''; selectedTeam = ''; }
  renderSettings();
  renderInputChips();
}

function addTeamToVendor(vi) {
  var input = document.getElementById('newTeam_'+vi);
  if (!input) return;
  var t = input.value.trim();
  if (!t) return;
  var vendors = getVendors();
  if (!vendors[vi]) return;
  if (vendors[vi].teams.includes(t)) { showToast('이미 등록된 팀입니다'); return; }
  vendors[vi].teams.push(t);
  saveVendors(vendors);
  renderSettings();
  renderInputChips();
}
function removeTeamFromVendor(vi, ti) {
  var vendors = getVendors();
  if (!vendors[vi]) return;
  var removed = vendors[vi].teams.splice(ti, 1)[0];
  saveVendors(vendors);
  if (removed && selectedTeam === removed) selectedTeam = '';
  renderSettings();
  renderInputChips();
}

function addMenuItem() {
  var name  = document.getElementById('newMenuName').value.trim();
  var price = parseInt(document.getElementById('newMenuPrice').value, 10) || 0;
  if (!name)  { showToast('품목명을 입력해주세요'); return; }
  if (!price) { showToast('금액을 입력해주세요'); return; }
  var menus = getMenus();
  if (menus.find(function(m){ return m.name===name; })) { showToast('이미 등록된 품목입니다'); return; }
  menus.push({ name: name, price: price });
  saveMenus(menus);
  document.getElementById('newMenuName').value  = '';
  document.getElementById('newMenuPrice').value = '';
  renderSettings();
  renderInputChips();
}
function removeMenuItem(idx) {
  var menus = getMenus();
  var removed = menus.splice(idx, 1)[0];
  saveMenus(menus);
  if (removed && selectedMenus[removed.name] !== undefined) delete selectedMenus[removed.name];
  renderSettings();
  renderInputChips();
}

// ── 유틸 ─────────────────────────────────────
function fmt(n) { return Number(n||0).toLocaleString('ko-KR'); }
function esc(s) { return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'"); }

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){
    b.classList.toggle('active', b.dataset.tab===tab);
  });
  document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById('tab-'+tab).classList.add('active');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); }, 2500);
}

init();
</script>
</body>
</html>
